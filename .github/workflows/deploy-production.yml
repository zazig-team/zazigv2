name: Deploy to Production

on:
  push:
    branches: [production]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run test

  push-production-migrations:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Upsert production agent version
        run: |
          set -euo pipefail
          hash=$(git rev-parse --short "$GITHUB_SHA")

          echo "Upserting production agent_versions row with version=$hash"
          curl -sS -f -X POST \
            "https://${SUPABASE_PRODUCTION_PROJECT_REF}.supabase.co/rest/v1/agent_versions" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"env\":\"production\",\"version\":\"${hash}\",\"commit_sha\":\"${hash}\"}"
        env:
          GITHUB_SHA: ${{ github.sha }}
          SUPABASE_PRODUCTION_PROJECT_REF: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_PRODUCTION_SERVICE_ROLE_KEY }}

      - name: Push migrations to PRODUCTION
        run: |
          supabase link --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF"
          supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PRODUCTION_PROJECT_REF: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}

  deploy-edge-functions:
    needs: push-production-migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ALL edge functions to PRODUCTION
        run: |
          for fn_dir in supabase/functions/*/; do
            fn=$(basename "$fn_dir")
            [ "$fn" = "_shared" ] && continue
            echo "Deploying: $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" --no-verify-jwt
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PRODUCTION_PROJECT_REF: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}
