name: Deploy to Staging

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run test

  push-staging-migrations:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to STAGING
        run: |
          supabase link --project-ref "$SUPABASE_STAGING_PROJECT_REF"
          supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}

  mirror-repo:
    needs: push-staging-migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Mirror repo to staging test repo
        run: |
          rm -rf .github/workflows
          git add -A
          git -c user.name="CI" -c user.email="ci@zazig.com" commit -m "mirror: staging snapshot" --allow-empty
          git -c http.postBuffer=524288000 push --force https://${STAGING_REPO_PAT}@github.com/zazig-team/zazigv2-staging-test-only.git HEAD:master
        env:
          STAGING_REPO_PAT: ${{ secrets.STAGING_REPO_PAT }}

  sync-prod-data:
    needs: mirror-repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Sync zazig company data from prod to staging
        run: bash scripts/sync-prod-to-staging.sh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PRODUCTION_PROJECT_REF: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}
          SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}

  deploy-edge-functions:
    needs: sync-prod-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed edge functions to STAGING
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [ "$BEFORE_SHA" = "$ZERO_SHA" ] || [ -z "$BEFORE_SHA" ]; then
            echo "First push detected (github.event.before is zero hash). Deploying all edge functions."
            changed_functions=$(find supabase/functions -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | grep -v '^_shared$' | sort)
          else
            DIFF_RANGE="$BEFORE_SHA..HEAD"
            echo "Detecting changed edge functions from diff range: $DIFF_RANGE"
            changed_functions=$(git diff --name-only "$DIFF_RANGE" | awk -F/ '/^supabase\/functions\/[^/]+\// {print $3}' | sort -u | grep -v '^_shared$' || true)
          fi

          if [ -z "$changed_functions" ]; then
            echo "No changed edge functions detected. Skipping deploy."
            exit 0
          fi

          echo "Changed edge functions:"
          echo "$changed_functions"

          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "Deploying: $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_STAGING_PROJECT_REF" --no-verify-jwt
          done <<< "$changed_functions"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
