<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document — Zazig</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090c;
      --surface: #101216;
      --border: #1e2328;
      --text: #e2e4e8;
      --text-secondary: #8b919a;
      --text-dim: #555d68;
      --accent: #4d8fef;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #1a1e24 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.4;
      pointer-events: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 9, 12, 0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent), 0 0 20px rgba(77, 143, 239, 0.3);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px var(--accent), 0 0 20px rgba(77, 143, 239, 0.3); }
      50% { box-shadow: 0 0 12px var(--accent), 0 0 30px rgba(77, 143, 239, 0.5); }
    }

    .logo-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .back-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-decoration: none;
    }

    .back-link:hover { color: var(--text); }

    .content {
      position: relative;
      max-width: 860px;
      margin: 48px auto;
      padding: 0 24px;
    }

    #doc-title {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    #doc-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    #doc-body {
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <script type="module">
    import { requireAuth } from './app.js';
    const session = await requireAuth();
    if (session) { document.getElementById('app-content').style.display = ''; }
  </script>
  <div id="app-content" style="display:none">
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo"></div>
        <span class="logo-name">Zazig</span>
      </div>
      <a href="/index.html" class="back-link">&larr; Pipeline</a>
    </div>

    <div class="content">
      <h1 id="doc-title">Document</h1>
      <p id="doc-meta"></p>
      <div id="doc-body"></div>
    </div>
  </div>
</body>
</html>
