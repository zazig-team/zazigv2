<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090c;
      --surface: #101216;
      --surface-raised: #161a1f;
      --border: #1e2328;
      --border-subtle: #181c21;
      --text: #e2e4e8;
      --text-secondary: #8b919a;
      --text-dim: #555d68;

      --col-design: #c471ed;
      --col-building: #e8a838;
      --col-testing: #4d8fef;
      --col-verifying: #28b5d4;
      --col-done: #3cbf6e;

      --col-design-bg: rgba(196, 113, 237, 0.06);
      --col-building-bg: rgba(232, 168, 56, 0.06);
      --col-testing-bg: rgba(77, 143, 239, 0.06);
      --col-verifying-bg: rgba(40, 181, 212, 0.06);
      --col-done-bg: rgba(60, 191, 110, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: auto;
    }

    /* Subtle dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #1a1e24 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────── */

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 9, 12, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--col-testing);
      box-shadow: 0 0 8px var(--col-testing), 0 0 20px rgba(77, 143, 239, 0.3);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px var(--col-testing), 0 0 20px rgba(77, 143, 239, 0.3); }
      50% { box-shadow: 0 0 12px var(--col-testing), 0 0 30px rgba(77, 143, 239, 0.5); }
    }

    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .last-updated {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    .refresh-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .refresh-btn:hover {
      color: var(--text);
      border-color: #2e343b;
      background: #1c2127;
    }

    .refresh-btn:disabled { opacity: 0.4; cursor: wait; }

    #message {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 0 24px;
      min-height: 0;
      transition: min-height 0.2s ease;
    }

    #message:not(:empty) {
      min-height: 36px;
      display: flex;
      align-items: center;
    }

    #message.error {
      color: #f87171;
      background: rgba(239, 68, 68, 0.08);
      border-bottom: 1px solid rgba(248, 113, 113, 0.15);
    }

    /* ── Kanban Board ──────────────────────────── */

    .board {
      display: flex;
      gap: 1px;
      flex: 1;
      min-height: 0;
      background: var(--border-subtle);
    }

    .column {
      flex: 1;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .column-header {
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .column-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .column-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .column-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .column-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-dim);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      min-width: 20px;
      text-align: center;
    }

    .column-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .column-body::-webkit-scrollbar { width: 4px; }
    .column-body::-webkit-scrollbar-track { background: transparent; }
    .column-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .column-empty {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
      padding: 32px 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      margin: 4px;
    }

    /* ── Feature Cards ─────────────────────────── */

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      animation: card-in 0.3s ease both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: #2a3038;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    .card-accent {
      height: 2px;
      width: 100%;
    }

    .card-body {
      padding: 12px 14px;
    }

    .card-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 10px;
      word-break: break-word;
    }

    /* ── Jobs inside cards ─────────────────────── */

    .card-jobs {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .job-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 10px;
      background: var(--surface-raised);
      border: 1px solid var(--border-subtle);
      border-radius: 7px;
    }

    .job-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .job-info {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex: 1;
    }

    .job-status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .job-status-dot.executing {
      background: var(--col-building);
      box-shadow: 0 0 6px rgba(232, 168, 56, 0.5);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    .job-status-dot.queued, .job-status-dot.dispatched {
      background: var(--text-dim);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    .job-status-dot.complete { background: var(--col-done); }
    .job-status-dot.failed { background: #ef4444; }
    .job-status-dot.reviewing { background: var(--col-verifying); animation: dot-pulse 2s ease-in-out infinite; }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .job-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .job-model-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      padding: 0 5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .job-progress-track {
      height: 3px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 3px;
      overflow: hidden;
    }

    .job-progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .card-footer {
      padding: 8px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border-subtle);
    }

    .card-job-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .card-progress-summary {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    /* ── Empty board ───────────────────────────── */

    .empty-board {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-dim);
      padding: 40px;
    }

    /* ── Responsive ────────────────────────────── */

    @media (max-width: 900px) {
      .board {
        flex-direction: column;
        gap: 0;
      }

      .column {
        min-width: 0;
        border-bottom: 1px solid var(--border);
      }

      .column-body {
        max-height: 50vh;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo"></div>
        <h1>Pipeline</h1>
      </div>
      <div class="controls">
        <span id="lastUpdated" class="last-updated"></span>
        <button id="refreshButton" class="refresh-btn" type="button">Refresh</button>
      </div>
    </header>

    <div id="message" aria-live="polite" role="status"></div>
    <main id="dashboard" class="board" aria-live="polite"></main>
  </div>

  <script>
    (() => {
      'use strict';

      const SUPABASE_URL = 'https://jmussmwglgbwncgygzbz.supabase.co';
      const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptdXNzbXdnbGdid25jZ3lnemJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NTMyNDEsImV4cCI6MjA4NzAyOTI0MX0.bI2U8TNQ5FZ5ri3DUWJGZFuvC99WGc-fslmZZ5TcQo0';
      const FEATURES_ENDPOINT = SUPABASE_URL + '/rest/v1/features?select=*,jobs(*)&status=not.eq.cancelled&order=created_at.desc';

      // Pipeline stage order: left → right
      const COLUMNS = [
        { key: 'design',    label: 'Design',    color: '#c471ed', bg: 'var(--col-design-bg)' },
        { key: 'building',  label: 'Building',  color: '#e8a838', bg: 'var(--col-building-bg)' },
        { key: 'testing',   label: 'Testing',   color: '#4d8fef', bg: 'var(--col-testing-bg)' },
        { key: 'verifying', label: 'Verifying', color: '#28b5d4', bg: 'var(--col-verifying-bg)' },
        { key: 'done',      label: 'Done',      color: '#3cbf6e', bg: 'var(--col-done-bg)' },
      ];

      const ACTIVE_JOB_STATUSES = new Set(['queued', 'dispatched', 'executing', 'reviewing']);

      const dashboardEl = document.getElementById('dashboard');
      const messageEl = document.getElementById('message');
      const lastUpdatedEl = document.getElementById('lastUpdated');
      const refreshButton = document.getElementById('refreshButton');

      let isFetching = false;

      // ── Helpers ──────────────────────────────

      function formatTime(date) {
        const pad = v => String(v).padStart(2, '0');
        return pad(date.getHours()) + ':' + pad(date.getMinutes()) + ':' + pad(date.getSeconds());
      }

      function setMessage(text, isError) {
        messageEl.textContent = text;
        messageEl.className = isError ? 'error' : '';
      }

      function normalizeStatus(status) {
        return String(status || '').trim().toLowerCase();
      }

      function getFeatureName(feature) {
        if (typeof feature?.name === 'string' && feature.name.trim()) {
          return feature.name.trim();
        }
        if (feature?.spec != null) {
          var specText = typeof feature.spec === 'string'
            ? feature.spec
            : JSON.stringify(feature.spec);
          var firstLine = specText.split(/\r?\n/, 1)[0].trim();
          if (firstLine) return firstLine;
        }
        return String(feature?.id ?? 'feature');
      }

      function clampProgress(value) {
        var n = Number(value);
        return Number.isFinite(n) ? Math.max(0, Math.min(100, Math.round(n))) : 0;
      }

      function getJobSummary(job) {
        var fallback = String(job?.id ?? 'job');
        if (job?.context == null) return fallback;
        var text = typeof job.context === 'string' ? job.context : JSON.stringify(job.context);
        text = text.replace(/\s+/g, ' ').trim();
        if (!text) return fallback;
        return text.length > 50 ? text.slice(0, 47) + '...' : text;
      }

      function sortJobs(jobs) {
        return [...jobs].sort(function(a, b) {
          var sa = Number.isFinite(Number(a?.sequence)) ? Number(a.sequence) : Infinity;
          var sb = Number.isFinite(Number(b?.sequence)) ? Number(b.sequence) : Infinity;
          if (sa !== sb) return sa - sb;
          return String(a?.created_at || '').localeCompare(String(b?.created_at || ''));
        });
      }

      function getJobColor(status, colDef) {
        if (status === 'complete') return 'var(--col-done)';
        if (status === 'failed') return '#ef4444';
        return colDef.color;
      }

      // ── DOM Builders ─────────────────────────

      function el(tag, className, text) {
        var e = document.createElement(tag);
        if (className) e.className = className;
        if (text != null) e.textContent = text;
        return e;
      }

      function renderJobRow(job, colDef) {
        var row = el('div', 'job-row');
        var header = el('div', 'job-header');
        var info = el('div', 'job-info');

        var status = normalizeStatus(job?.status);
        var dot = el('div', 'job-status-dot ' + status);
        info.appendChild(dot);

        var name = el('span', 'job-name', getJobSummary(job));
        info.appendChild(name);
        header.appendChild(info);

        if (job?.model) {
          var modelTag = el('span', 'job-model-tag', String(job.model).replace('claude-', '').replace('-4-6', ''));
          header.appendChild(modelTag);
        }

        row.appendChild(header);

        // Progress bar
        var progress = clampProgress(job?.progress);
        if (progress > 0 || ACTIVE_JOB_STATUSES.has(status)) {
          var track = el('div', 'job-progress-track');
          var fill = el('div', 'job-progress-fill');
          fill.style.width = progress + '%';
          fill.style.background = getJobColor(status, colDef);
          track.appendChild(fill);
          row.appendChild(track);
        }

        return row;
      }

      function renderCard(feature, colDef, delay) {
        var card = el('div', 'card');
        card.style.animationDelay = delay + 'ms';

        // Colored accent strip
        var accent = el('div', 'card-accent');
        accent.style.background = colDef.color;
        card.appendChild(accent);

        // Body
        var body = el('div', 'card-body');
        var title = el('div', 'card-title', getFeatureName(feature));
        body.appendChild(title);

        var jobs = Array.isArray(feature?.jobs) ? sortJobs(feature.jobs) : [];

        if (jobs.length > 0) {
          var jobsContainer = el('div', 'card-jobs');
          for (var i = 0; i < jobs.length; i++) {
            jobsContainer.appendChild(renderJobRow(jobs[i], colDef));
          }
          body.appendChild(jobsContainer);
        }

        card.appendChild(body);

        // Footer with summary
        if (jobs.length > 0) {
          var footer = el('div', 'card-footer');
          var countLabel = el('span', 'card-job-count', jobs.length + (jobs.length === 1 ? ' job' : ' jobs'));
          footer.appendChild(countLabel);

          var completed = jobs.filter(function(j) {
            return normalizeStatus(j?.status) === 'complete';
          }).length;
          var progressLabel = el('span', 'card-progress-summary', completed + '/' + jobs.length + ' done');
          footer.appendChild(progressLabel);

          card.appendChild(footer);
        }

        return card;
      }

      function renderColumn(colDef, features) {
        var column = el('div', 'column');

        var header = el('div', 'column-header');
        var titleGroup = el('div', 'column-title');

        var dot = el('div', 'column-dot');
        dot.style.background = colDef.color;
        titleGroup.appendChild(dot);

        var name = el('span', 'column-name', colDef.label);
        titleGroup.appendChild(name);

        header.appendChild(titleGroup);

        var count = el('span', 'column-count', String(features.length));
        header.appendChild(count);

        column.appendChild(header);

        var body = el('div', 'column-body');

        if (features.length === 0) {
          var empty = el('div', 'column-empty', 'No features');
          body.appendChild(empty);
        } else {
          for (var i = 0; i < features.length; i++) {
            body.appendChild(renderCard(features[i], colDef, i * 50));
          }
        }

        column.appendChild(body);
        return column;
      }

      function renderBoard(features) {
        var grouped = {};
        for (var c = 0; c < COLUMNS.length; c++) {
          grouped[COLUMNS[c].key] = [];
        }

        for (var i = 0; i < features.length; i++) {
          var status = normalizeStatus(features[i]?.status);
          if (status === 'cancelled') continue;
          if (grouped[status]) {
            grouped[status].push(features[i]);
          }
        }

        var fragment = document.createDocumentFragment();
        var totalFeatures = 0;

        for (var c = 0; c < COLUMNS.length; c++) {
          var colFeatures = grouped[COLUMNS[c].key] || [];
          totalFeatures += colFeatures.length;
          fragment.appendChild(renderColumn(COLUMNS[c], colFeatures));
        }

        dashboardEl.replaceChildren(fragment);

        if (totalFeatures === 0) {
          dashboardEl.replaceChildren(el('div', 'empty-board', 'No active features'));
        }
      }

      // ── Data Fetching ────────────────────────

      async function fetchFeatures() {
        var response = await fetch(FEATURES_ENDPOINT, {
          method: 'GET',
          headers: {
            apikey: ANON_KEY,
            Authorization: 'Bearer ' + ANON_KEY
          }
        });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        var payload = await response.json();
        return Array.isArray(payload) ? payload : [];
      }

      async function refreshDashboard() {
        if (isFetching) return;
        isFetching = true;
        refreshButton.disabled = true;

        try {
          var features = await fetchFeatures();
          renderBoard(features);
          setMessage('');
          lastUpdatedEl.textContent = formatTime(new Date());
        } catch (err) {
          setMessage('Failed to load \u2014 retrying in 30s', true);
        } finally {
          isFetching = false;
          refreshButton.disabled = false;
        }
      }

      refreshButton.addEventListener('click', function() { void refreshDashboard(); });
      void refreshDashboard();
      setInterval(function() { void refreshDashboard(); }, 30000);
    })();
  </script>
</body>
</html>
