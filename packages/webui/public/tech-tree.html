<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c111b;
    --bg-card: #151c2c;

  .legend {

  }
  .legend-item { display: flex; align-items: center; gap: 5px; color: var(--text-dim); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .legend-dot.shipped { background: var(--shipped); }
  .legend-dot.active { background: var(--active); }
  .legend-dot.draft { background: var(--draft); }
  .legend-dot.locked { background: var(--locked); }

  .lane-labels {

  }

  .lane-stripe {
    position: absolute; left: 158px; width: 2400px; height: 70px;
    border-radius: 3px; opacity: 0.025;
  }

  .node {
    position: absolute; width: 180px; height: 56px;

  .node:hover { transform: translateY(-1px); z-index: 10; }
  .node.shipped { border-left-color: var(--shipped); }
  .node.shipped:hover { box-shadow: 0 0 16px rgba(16,185,129,0.15); }
  .node.active { border-left-color: var(--active); }
  .node.active:hover { box-shadow: 0 0 16px rgba(245,158,11,0.15); }
  .node.draft { border-left-color: var(--draft); }
  .node.draft:hover { box-shadow: 0 0 16px rgba(129,140,248,0.15); }
  .node.locked { border-left-color: var(--locked); opacity: 0.4; }

  .node-top { display: flex; align-items: center; gap: 6px; }
  .node-icon { font-size: 15px; flex-shrink: 0; }
  .node-title { font-size: 12px; font-weight: 600; color: var(--text-bright); line-height: 1.2; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .node.locked .node-title { color: var(--text-dim); }
  .node-bar { margin-top: 5px; height: 2px; background: #1e293b; border-radius: 1px; overflow: hidden; }
  .node-bar-fill { height: 100%; border-radius: 1px; }
  .node.shipped .node-bar-fill { background: var(--shipped); }
  .node.active .node-bar-fill { background: var(--active); }
  .node.draft .node-bar-fill { background: var(--draft); }
  .node-status-dot { position: absolute; top: 6px; right: 6px; width: 5px; height: 5px; border-radius: 50%; }
  .node.shipped .node-status-dot { background: var(--shipped); box-shadow: 0 0 4px var(--shipped); }
  .node.active .node-status-dot { background: var(--active); box-shadow: 0 0 4px var(--active); }
  .node.draft .node-status-dot { background: var(--draft); }
  .node.locked .node-status-dot { background: var(--locked); }

  .node.next-up { box-shadow: 0 0 0 2px rgba(245,158,11,0.4), 0 0 20px rgba(245,158,11,0.1); }
  .node.next-up::after {
    content: 'NEXT'; position: absolute; top: -8px; right: 8px;
    font-size: 8px; font-weight: 700; letter-spacing: 1px;
    color: var(--active); background: var(--bg); padding: 1px 5px; border-radius: 3px;

  .tooltip {
    display: none; position: fixed; z-index: 200;
    background: #1a2236; border: 1px solid #2d3a52; border-radius: 8px;

  .tooltip-title { font-size: 13px; font-weight: 600; color: var(--text-bright); margin-bottom: 4px; }
  .tooltip-status { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .tooltip-status.shipped { color: var(--shipped); }
  .tooltip-status.active { color: var(--active); }
  .tooltip-status.draft { color: var(--draft); }
  .tooltip-status.locked { color: var(--locked); }

  .tooltip-deps { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-dim); line-height: 1.6; }
  .tooltip-deps strong { color: var(--text); }

  .connections { position: absolute; top: 0; left: 0; pointer-events: none; }

    position: fixed; right: 28px; top: 50%; transform: translateY(-50%);

    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;

  .modal {
    background: #131a2b; border: 1px solid #2d3a52; border-radius: 12px;

    display: flex; flex-direction: column;

  .modal-status-badge {

  .modal-status-badge.active { color: var(--active); background: rgba(245,158,11,0.1); }

  .modal-status-badge.locked { color: var(--locked); background: rgba(51,65,85,0.3); }
  .modal-progress-text { font-size: 11px; color: var(--text-dim); }
  .modal-close {
    background: none; border: none; color: var(--text-dim); font-size: 20px;

  }
  .modal-close:hover { color: var(--text); background: rgba(255,255,255,0.05); }

  .modal-body {
    padding: 20px 24px; overflow-y: auto; flex: 1;
    scrollbar-width: thin; scrollbar-color: #2d3a52 transparent;
  }
  .modal-body::-webkit-scrollbar { width: 6px; }
  .modal-body::-webkit-scrollbar-thumb { background: #2d3a52; border-radius: 3px; }

  /* Markdown rendering */
  .modal-content { user-select: text; }
  .modal-content h2 { font-size: 14px; font-weight: 700; color: var(--text-bright); margin: 20px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .modal-content h3 { font-size: 13px; font-weight: 600; color: var(--text-bright); margin: 16px 0 6px; }
  .modal-content p { font-size: 12px; color: var(--text); line-height: 1.65; margin-bottom: 10px; }
  .modal-content ul, .modal-content ol { font-size: 12px; color: var(--text); line-height: 1.65; margin: 0 0 10px 18px; }
  .modal-content li { margin-bottom: 4px; }
  .modal-content strong { color: var(--text-bright); }
  .modal-content code { background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; font-size: 11px; color: #93c5fd; }
  .modal-content pre { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin: 10px 0; overflow-x: auto; }
  .modal-content pre code { background: none; padding: 0; font-size: 11px; color: var(--text); }
  .modal-content blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--text-dim); margin: 10px 0; }
  .modal-content table { border-collapse: collapse; margin: 10px 0; font-size: 11px; width: 100%; }
  .modal-content th { text-align: left; padding: 6px 10px; border-bottom: 2px solid var(--border); color: var(--text-bright); font-weight: 600; }
  .modal-content td { padding: 5px 10px; border-bottom: 1px solid var(--border); }

  .modal-footer {
    padding: 14px 24px; border-top: 1px solid var(--border); flex-shrink: 0;
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .modal-dep-tag {
    font-size: 10px; padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--border); color: var(--text-dim);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .modal-dep-tag .dot { width: 5px; height: 5px; border-radius: 50%; }
  .modal-dep-tag .dot.shipped { background: var(--shipped); }
  .modal-dep-tag .dot.active { background: var(--active); }

</style>

<script>
const LANE_H = 82, LANE_TOP = 72, COL_W = 210, COL_LEFT = 170, NODE_W = 180, NODE_H = 56;

const LANES = [
  { id: 'brain', label: 'Agent Brain', color: 'var(--lane-brain)' },
  { id: 'identity', label: 'Agent Identity', color: 'var(--lane-identity)' },
  { id: 'infra', label: 'Infrastructure', color: 'var(--lane-infra)' },
  { id: 'pipeline', label: 'Pipeline', color: 'var(--lane-pipeline)' },
  { id: 'interface', label: 'Interface', color: 'var(--lane-interface)' },
  { id: 'platform', label: 'Platform', color: 'var(--lane-platform)' },
  { id: 'strategy', label: 'Strategy', color: 'var(--lane-strategy)' },
];
const laneIndex = {}; LANES.forEach((l, i) => { laneIndex[l.id] = i; });

const NODES = [
  // === Agent Brain ===
  { id: 'personality', lane: 'brain', col: 0, icon: '🧬', title: 'Personality', status: 'shipped', progress: 85,
    tooltip: '9 numeric dimensions per archetype. Compiled into prompt at dispatch.',
    deps: [], unlocks: ['memory-p1'],
    details: `## What It Is

Personality as **bounded numeric coordinates**, not prose. Each exec archetype (e.g. "Pragmatist CTO") has 9 dimensions with min/max bounds:

- Verbosity (10-40), Formality (60-90), Risk tolerance (20-50), etc.
- Compiled into a natural-language prompt snippet at dispatch time
- Agent never sees raw numbers — only the compiled personality description

## Three-Layer Stack

1. **Archetype Philosophy** (immutable) — "The Pragmatist values shipping over perfection"
2. **Personality Dimensions** (numeric bounds per archetype)
3. **Per-user Contextual Modifiers** — small ±5 offset on one dimension based on who's talking

## What's Built

- Archetype definitions in DB (exec_archetypes table)
- Dimension compilation logic
- Prompt injection at dispatch time
- Archetype picker in WebUI with write-back

## What's Next

- Personality evolution tracking (personality_evolution_log table exists but unused)
- Dimension drift detection — has the agent's behavior shifted over time?
- Founder calibration — Tom/Chris tune the dimensions based on experience

## Key Decision

Personality is **anti-SOUL.md**. OpenClaw/Spacebot used long prose personality files that agents could self-modify. We use coordinates that the orchestrator controls — deterministic, bounded, not vulnerable to prompt injection.

## Design Doc
\`docs/plans/shipped/2026-02-20-exec-personality-system-design.md\`` },

  { id: 'memory-p1', lane: 'brain', col: 1, icon: '🧠', title: 'Memory P1', status: 'active', progress: 35, nextUp: true,
    tooltip: '9-type taxonomy. Schema deployed. Next: orchestrator bulletin injection.',
    deps: ['personality'], unlocks: ['doctrines-p1'],
    details: `## What It Is

A **9-type memory taxonomy** inspired by Google's always-on-memory-agent research. Every memory chunk is typed, scored, and retrieved by relevance:

| Type | Example |
|------|---------|
| Identity | "I am the CPO of zazig-dev" |
| Decision | "We chose coordinates over prose for personality" |
| Gotcha | "GoTrue reads redirect_to as a query param, not body" |
| Fact | "Staging Supabase ref is ciksoitqfwkgnxxtkscq" |
| Preference | "Tom prefers TypeScript for everything" |
| Observation | "Codex jobs fail silently when job_type not in CardType" |
| Moment | "2026-03-05: 7 features bulk-failed at same second" |
| Relationship | "Chris handles staging/production, Tom handles orchestrator" |
| Procedure | "Deploy edge functions: SUPABASE_ACCESS_TOKEN=... npx supabase functions deploy" |

## Architecture

- **Tier-specific budgets**: Persistent agents ~1500 tokens, contractors ~400 tokens
- **Mandatory slot reservation** for memory retrieval in every job
- **LLM rerank**: Retrieve top 20 by vector similarity, rerank to top 5 by LLM judgment
- **Consolidation sleep cycles**: Periodic job that merges duplicates, promotes observations to facts, decays stale memories

## What's Built

- Schema and data model (memory_chunks table)
- Retrieval query design
- Token budget calculations

## What's Next (Phase 1)

- **Bulletin injection**: Orchestrator assembles a "memory bulletin" at dispatch time — top memories relevant to the current job context
- **LLM rerank implementation**: Vector similarity alone misses nuance
- **Write path**: Agents can store memories via MCP tool during execution

## Design Doc
\`docs/plans/active/2026-03-03-memory-system-design.md\`` },

  { id: 'doctrines-p1', lane: 'brain', col: 2, icon: '📜', title: 'Doctrines', status: 'draft', progress: 15,
    tooltip: 'Role-specific heuristics, proactively injected. Architecture approved (v5).',
    deps: ['memory-p1'], unlocks: ['memory-p2'],
    details: `## What It Is

**Doctrines** are role-specific heuristics, frameworks, and policies that shape how an agent thinks. They're the "beliefs" layer — injected proactively into every prompt, not searched reactively.

Examples:
- CPO Doctrine: "Never create features directly — commission a Project Architect"
- CTO Doctrine: "Frame rules as beliefs — agents adhere to beliefs more reliably than rules"
- Senior Eng Doctrine: "Every PR must have tests that exercise the acceptance criteria"

## How It Works

- ~500 tokens per role, cached across jobs (static prefix)
- Stored in DB as structured entries per role
- Orchestrator injects at Layer 4 of the prompt stack
- Agents don't search for doctrines — they're always present
- Different roles can have **contradictory** doctrines (CPO values speed, reviewer values thoroughness)

## Doctrines vs Canons

| | Doctrines | Canons |
|---|---|---|
| Scope | Per-role | Company-wide |
| Injection | Proactive (always present) | Reactive (searched on demand) |
| Size | ~500 tokens | Unlimited (retrieved subset) |
| Nature | Heuristics, policies | Reference knowledge (books, playbooks) |

## What's Next

1. Initial doctrine library: CPO, CTO, Senior Engineer (3 roles)
2. Injection flow via orchestrator prompt assembly
3. Evaluation harness — do doctrines actually change agent behavior?

## Design Doc
\`docs/plans/active/2026-02-22-exec-knowledge-architecture-v5.md\`` },

  { id: 'memory-p2', lane: 'brain', col: 3, icon: '🧠', title: 'Memory P2', status: 'locked', progress: 0,
    tooltip: 'Active consolidation sleep cycles. Merge duplicates, promote observations.',
    deps: ['doctrines-p1'], unlocks: ['canons'],
    details: `## What It Is

Phase 2 of the memory system adds **active consolidation** — the system doesn't just store memories, it actively maintains and improves them.

## Key Capabilities

- **Consolidation sleep cycles**: Periodic background job that processes the memory store
  - Merge near-duplicate memories (e.g., two "Gotcha" entries about the same issue)
  - Promote recurring observations to facts (if observed 3+ times, it's a fact)
  - Decay stale memories (reduce relevance score over time if never retrieved)
  - Cross-reference memories with new context

- **Memory quality scoring**: Each memory gets a confidence score based on:
  - Source reliability (human > exec > contractor)
  - Confirmation count (how many times has this been independently observed?)
  - Recency (when was this last relevant?)

## Prerequisites

- Memory P1 must be deployed and generating memories
- Doctrines must be working (consolidation uses doctrine context to evaluate memories)

## Design Doc
\`docs/plans/active/2026-03-03-memory-system-design.md\` (Section 4.6: Active Consolidation)` },

  { id: 'canons', lane: 'brain', col: 4, icon: '📚', title: 'Canons', status: 'locked', progress: 0,
    tooltip: 'Shared reference knowledge. Hybrid search: vector + BM25.',
    deps: ['memory-p2'], unlocks: ['auto-spec'],
    details: `## What It Is

**Canons** are shared reference knowledge — books, playbooks, regulations, industry standards. Unlike doctrines (per-role, proactive), canons are company-wide and retrieved on demand via hybrid search.

## Examples

- "The Lean Startup" methodology — available to any agent doing product work
- Company coding standards — available to engineers and reviewers
- Apple App Store review guidelines — available to anyone building iOS features
- Internal post-mortems — available to anyone investigating similar issues

## How It Works

- Stored as chunked documents with embeddings
- **Hybrid retrieval**: Vector similarity + BM25 keyword search
- **LLM rerank**: Top 20 candidates reranked to top 5 by relevance to current task
- Any role can search canons, but retrieval is context-aware (CPO gets product-relevant chunks, engineer gets technical chunks)

## Prerequisites

- Memory P2 (consolidation patterns reused for canon maintenance)
- Embedding infrastructure

## Future: Canon Marketplace

Eventually, canons could be shared across companies — "install" a canon package like "SaaS Pricing Best Practices" or "GDPR Compliance Playbook".

## Design Doc
\`docs/plans/active/2026-02-22-exec-knowledge-architecture-v5.md\` (Layer 5: Canons)` },

  { id: 'auto-spec', lane: 'brain', col: 5, icon: '🤖', title: 'Auto-Spec', status: 'locked', progress: 0,
    tooltip: 'CPO auto-specs triaged ideas when pipeline quiet. The brain fully online.',
    deps: ['canons', 'auto-greenlight'], unlocks: ['strategy-sim'],
    details: `## What It Is

The culmination of the Agent Brain lane. CPO operates **autonomously** — when the pipeline is quiet and triaged ideas are waiting, CPO automatically:

1. Picks the highest-priority triaged idea
2. Promotes it to a feature
3. Writes a full spec with acceptance criteria
4. Pushes it to \`ready_for_breakdown\`

This requires LLM judgment (unlike Auto-Greenlight which is mechanical).

## Prerequisites

Everything in the brain lane must be online:
- **Memory**: CPO remembers past decisions, user preferences, project context
- **Doctrines**: CPO follows its role-specific heuristics for product decisions
- **Canons**: CPO references company knowledge (strategy docs, past specs)
- **Auto-Greenlight**: Pipeline capacity detection working

## Autonomy Model

Auto-spec runs on the **CPO major heartbeat** — a scheduled persistent job that fires periodically. It checks:
1. Is the pipeline idle? (no running builds)
2. Are there triaged ideas waiting?
3. Does the company have capacity for new work?

If all yes → spec the next idea.

## Design Doc
\`docs/plans/active/2026-03-03-auto-scheduling-design.md\`` },

  // === Agent Identity ===
  { id: 'roles', lane: 'identity', col: 0, icon: '🎭', title: 'Roles & Prompts', status: 'shipped', progress: 100,
    tooltip: 'Role table, prompt injection, skills system.',
    deps: [], unlocks: ['persistent-id'],
    details: `## What It Is

The foundation of agent identity. Every agent has a **role** that defines:

- **Prompt** (Layer 2): operational scope, responsibilities, hard stops, output contract
- **Skills**: procedural capability files loaded per job from \`~/.claude/skills/\`
- **Model**: which LLM to use (being replaced by model preferences — see Model Flexibility)
- **Persistence**: whether this role auto-creates standing jobs

## Current Roles

| Role | Model | Persistent | Type |
|------|-------|-----------|------|
| CPO | Opus | Yes | Executive |
| CTO | Sonnet | Yes | Executive |
| Senior Engineer | Sonnet | No | Employee |
| Reviewer | Sonnet | No | Employee |
| Junior Engineer | Codex | No | Employee |
| Breakdown Specialist | Sonnet | No | Contractor |
| Project Architect | Sonnet | No | Contractor |
| Verification Specialist | Sonnet | No | Contractor |

    deps: ['data-model'], unlocks: ['deep-heartbeat'],
    details: `## What It Is

The **deterministic** orchestrator — a Supabase Edge Function that runs pure logic, no LLM. It:

1. Polls the job queue for \`queued\` jobs
2. Checks machine slot availability via heartbeats
3. Routes jobs by complexity → role → model → available machine
4. Dispatches via Supabase Realtime websockets
5. Manages job lifecycle transitions

## Key Behaviors

- **DAG dispatch**: Respects \`depends_on\` UUID arrays — won't dispatch a job until all dependencies complete
- **Slot tracking**: Calculates available = total - in-use per machine
- **Complexity routing**: simple → junior-engineer, medium → senior-engineer, complex → CPO
- **Machine recovery**: 2-min heartbeat timeout, 60s cooldown after reconnect

## Architecture Decision

The orchestrator is **deliberately non-AI**. All routing decisions are deterministic. This means:
- Changes ship instantly (edge function redeploy, no model retraining)
- Behavior is predictable and debuggable
- The "intelligence" lives in the agents, not the dispatcher

    deps: ['orchestrator'], unlocks: ['triggers'],
    details: `## What It Is

Goes beyond "machine alive/dead" to **per-job health reporting**. The heartbeat payload includes:

- Job progress indicators (what stage is the agent at?)
- Context health (is the context window filling up? Is the agent looping?)
- Stuck detection (no progress for N minutes → alert)
- Resource usage (token consumption rate)

## Why It Matters

Without deep heartbeat, we only know "the machine is online." We don't know if a specific job is stuck in an infinite loop, running out of context, or making progress. This is the foundation for self-healing.

## What's Built

- Health payload schema
- Heartbeat receiver edge function
- Stuck detection thresholds (configurable per job type)
- Machine dead detection (2-min timeout)

## What's Next

- Event queue consumer for health alerts
- Lifecycle hook callbacks (on-stuck, on-context-full)
- Job-level health dashboard in WebUI
- Automatic stuck job recovery (kill + re-queue)

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.id] = n; });

function nodeX(n) { return COL_LEFT + n.col * COL_W; }
function nodeY(n) { return LANE_TOP + laneIndex[n.lane] * LANE_H; }
function nodeRight(n) { return nodeX(n) + NODE_W; }
function nodeLeft(n) { return nodeX(n); }
function nodeCY(n) { return nodeY(n) + NODE_H / 2; }

// ============================================================
// RENDER
// ============================================================
const container = document.getElementById('container');
const laneLabels = document.getElementById('lane-labels');
const svg = document.getElementById('connections');
const tooltip = document.getElementById('tooltip');

const maxCol = Math.max(...NODES.map(n => n.col));
const totalWidth = COL_LEFT + (maxCol + 1) * COL_W + 80;
container.style.width = totalWidth + 'px';
svg.setAttribute('width', totalWidth);
svg.setAttribute('height', LANE_TOP + LANES.length * LANE_H + 40);

LANES.forEach((lane, i) => {
  const y = LANE_TOP + i * LANE_H;
  const label = document.createElement('div');
  label.className = 'lane-label';
  label.style.top = (y + 12) + 'px';
  label.style.color = lane.color;
  label.style.borderRightColor = lane.color;
  label.textContent = lane.label;
  laneLabels.appendChild(label);
  const stripe = document.createElement('div');
  stripe.className = 'lane-stripe';
  stripe.style.top = (y - 6) + 'px';
  stripe.style.background = lane.color;
  container.appendChild(stripe);
});

NODES.forEach(node => {
  const el = document.createElement('div');
  el.className = 'node ' + node.status + (node.nextUp ? ' next-up' : '');
  el.id = 'node-' + node.id;
  el.style.left = nodeX(node) + 'px';
  el.style.top = nodeY(node) + 'px';
  const showBar = node.progress > 0 && node.progress < 100;
  el.innerHTML = `
    <div class="node-status-dot"></div>
    <div class="node-top">
      <span class="node-icon">${node.icon}</span>
      <span class="node-title">${node.title}</span>
    </div>
    ${showBar ? `<div class="node-bar"><div class="node-bar-fill" style="width:${node.progress}%"></div></div>` : ''}
  `;
  el.addEventListener('mouseenter', e => showTooltip(e, node));
  el.addEventListener('mouseleave', hideTooltip);
  el.addEventListener('mousemove', moveTooltip);
  el.addEventListener('click', e => { e.stopPropagation(); hideTooltip(); openModal(node); });
  container.appendChild(el);
});

// Connections
requestAnimationFrame(() => {
  let paths = '';
  NODES.forEach(node => {
    node.unlocks.forEach(targetId => {
      const target = nodeMap[targetId];
      if (!target) return;
      const fromX = nodeRight(node), fromY = nodeCY(node);
      const toX = nodeLeft(target), toY = nodeCY(target);
      let color, opacity, dash;
      if (node.status === 'shipped' && target.status === 'shipped') { color = '#10b981'; opacity = 0.5; }
      else if (node.status === 'shipped' || node.status === 'active') { color = '#f59e0b'; opacity = 0.3; }
      else { color = '#334155'; opacity = 0.2; }
      dash = (target.status === 'locked') ? '3,3' : 'none';
      const sameLane = node.lane === target.lane;
      const gap = toX - fromX;
      if (sameLane && Math.abs(fromY - toY) < 5 && gap > 0 && gap < COL_W + 20) {
        paths += `<line x1="${fromX+3}" y1="${fromY}" x2="${toX-3}" y2="${toY}" stroke="${color}" stroke-opacity="${opacity}" stroke-width="1.5" stroke-dasharray="${dash}" />`;
      } else {
        const cpX = Math.max(30, Math.abs(gap) * 0.35);
        paths += `<path d="M${fromX+3},${fromY} C${fromX+cpX},${fromY} ${toX-cpX},${toY} ${toX-3},${toY}" fill="none" stroke="${color}" stroke-opacity="${opacity}" stroke-width="1.5" stroke-dasharray="${dash}" />`;
      }
      paths += `<polygon points="${toX-3},${toY} ${toX-7},${toY-3} ${toX-7},${toY+3}" fill="${color}" fill-opacity="${opacity}" />`;
    });
  });
  svg.innerHTML = paths;
});

// ============================================================
// TOOLTIP (hover)
// ============================================================
function showTooltip(e, node) {
  const deps = node.deps.map(id => { const d = nodeMap[id]; const m = d?.status === 'shipped' ? '✓' : d?.status === 'active' ? '◑' : '○'; return m + ' ' + (d?.title || id); });
  const unlockNames = node.unlocks.map(id => nodeMap[id]?.title || id);
  document.getElementById('tt-title').textContent = node.icon + ' ' + node.title;
  const se = document.getElementById('tt-status');
  se.textContent = node.status.toUpperCase() + (node.progress > 0 && node.progress < 100 ? ' — ' + node.progress + '%' : '');
  se.className = 'tooltip-status ' + node.status;
  document.getElementById('tt-body').textContent = node.tooltip + ' (click for details)';
  let html = '';
  if (deps.length) html += '<strong>Requires:</strong> ' + deps.join(', ') + '<br>';
  if (unlockNames.length) html += '<strong>Unlocks:</strong> ' + unlockNames.join(', ');
  document.getElementById('tt-deps').innerHTML = html || '<strong>Foundational</strong>';
  tooltip.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + 320 > window.innerWidth) x = e.clientX - 334;
  if (y + 200 > window.innerHeight) y = e.clientY - 200;
  tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }

// ============================================================
// MODAL (click)
// ============================================================
const modalOverlay = document.getElementById('modal-overlay');

function openModal(node) {
  document.getElementById('modal-icon').textContent = node.icon;
  document.getElementById('modal-title').textContent = node.title;

  const badge = document.getElementById('modal-status');
  badge.textContent = node.status.toUpperCase();
  badge.className = 'modal-status-badge ' + node.status;

  const prog = document.getElementById('modal-progress');
  prog.textContent = node.progress > 0 && node.progress < 100 ? node.progress + '% complete' : node.progress === 100 ? 'Complete' : '';

  // Render markdown details
  const content = document.getElementById('modal-content');
  if (typeof marked !== 'undefined' && node.details) {
    content.innerHTML = marked.parse(node.details);
  } else {
    content.innerHTML = '<p>' + (node.details || node.tooltip).replace(/\n/g, '<br>') + '</p>';
  }

  // Footer: deps + unlocks
  const footer = document.getElementById('modal-footer');
  let footerHtml = '';
  if (node.deps.length) {
    footerHtml += '<div class="modal-footer-label">Requires</div>';
    node.deps.forEach(id => {
      const d = nodeMap[id];
      if (d) footerHtml += `<span class="modal-dep-tag"><span class="dot ${d.status}"></span>${d.icon} ${d.title}</span>`;
    });
  }
  if (node.unlocks.length) {
    footerHtml += '<div class="modal-footer-label" style="margin-top:8px">Unlocks</div>';
    node.unlocks.forEach(id => {
      const d = nodeMap[id];
      if (d) footerHtml += `<span class="modal-dep-tag"><span class="dot ${d.status}"></span>${d.icon} ${d.title}</span>`;
    });
  }
  footer.innerHTML = footerHtml;

  modalOverlay.classList.add('visible');
  document.body.style.overflowX = 'hidden';
}

function closeModal() {
  modalOverlay.classList.remove('visible');
  document.body.style.overflowX = 'auto';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Hide scroll hint
document.body.addEventListener('scroll', () => {
  const hint = document.getElementById('scroll-hint');
  if (hint) hint.style.display = 'none';
}, { once: true });
</script>
</body>
