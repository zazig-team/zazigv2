name: Deploy Edge Functions

on:
  push:
    branches: [main, master]
    paths: ['supabase/functions/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Detect and deploy changed functions
        run: |
          # Check if _shared changed — if so, deploy everything
          shared_changed=$(git diff --name-only HEAD~1 HEAD -- supabase/functions/_shared/ || true)

          if [ -n "$shared_changed" ]; then
            echo "_shared changed — deploying ALL functions"
            for fn_dir in supabase/functions/*/; do
              fn=$(basename "$fn_dir")
              [ "$fn" = "_shared" ] && continue
              echo "Deploying: $fn"
              supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            done
          else
            # Deploy only changed functions
            changed=$(git diff --name-only HEAD~1 HEAD -- supabase/functions/ \
              | cut -d/ -f3 \
              | sort -u \
              | grep -v _shared \
              || true)

            if [ -z "$changed" ]; then
              echo "No edge functions changed."
              exit 0
            fi

            for fn in $changed; do
              echo "Deploying: $fn"
              supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            done
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
