name: Deploy to Staging

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run test

  push-staging-migrations:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Upsert staging agent version
        run: |
          set -euo pipefail

          changed_local_agent=$(git diff --name-only HEAD~1 HEAD -- packages/local-agent/ || true)
          if [ -z "$changed_local_agent" ]; then
            echo "No changes in packages/local-agent/. Skipping staging agent_version upsert."
            exit 0
          fi

          hash=$(git log -1 --format=%h -- packages/local-agent/)
          if [ -z "$hash" ]; then
            echo "Unable to resolve scoped hash for packages/local-agent/."
            exit 1
          fi

          echo "Upserting staging agent_versions row with version=$hash"
          curl -sS -f -X POST \
            "https://${SUPABASE_STAGING_PROJECT_REF}.supabase.co/rest/v1/agent_versions" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"env\":\"staging\",\"version\":\"${hash}\",\"commit_sha\":\"${hash}\"}"
        env:
          SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}

      - name: Push migrations to STAGING
        run: |
          supabase link --project-ref "$SUPABASE_STAGING_PROJECT_REF"
          supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}

  mirror-repo:
    needs: push-staging-migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Mirror repo to staging test repo
        run: |
          rm -rf .github/workflows
          git add -A
          git -c user.name="CI" -c user.email="ci@zazig.com" commit -m "mirror: staging snapshot" --allow-empty
          git -c http.postBuffer=524288000 push --force https://${STAGING_REPO_PAT}@github.com/zazig-team/zazigv2-staging-test-only.git HEAD:master
        env:
          STAGING_REPO_PAT: ${{ secrets.STAGING_REPO_PAT }}

  deploy-edge-functions:
    needs: mirror-repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions to STAGING
        run: |
          echo "Deploying all edge functions to staging..."
          changed_functions=$(find supabase/functions -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | grep -v '^_shared$' | sort)

          if [ -z "$changed_functions" ]; then
            echo "No edge functions found. Skipping."
            exit 0
          fi

          echo "Edge functions to deploy:"
          echo "$changed_functions"

          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "Deploying: $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_STAGING_PROJECT_REF" --no-verify-jwt
          done <<< "$changed_functions"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
