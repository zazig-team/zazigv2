name: CI

on:
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Check migration numbering
        run: |
          set -euo pipefail
          git fetch origin master --depth=1

          # Get migration prefixes from master and this branch
          master_files=$(git ls-tree --name-only origin/master supabase/migrations/ | sed 's|supabase/migrations/||')
          branch_files=$(ls supabase/migrations/)
          master_migrations=$(echo "$master_files" | grep -oE '^[0-9]+' | LC_ALL=C sort | uniq)
          branch_migrations=$(echo "$branch_files" | grep -oE '^[0-9]+' | LC_ALL=C sort | uniq)

          # Find conflicts: branch files that share a prefix with a master file but have a different name
          duplicates=$(echo "$branch_files" | while read -r branch_file; do
            prefix=$(echo "$branch_file" | grep -oE '^[0-9]+')
            [ -z "$prefix" ] && continue
            # If master has any file with this prefix but NOT this exact filename, it's a conflict
            if echo "$master_files" | grep -q "^${prefix}_"; then
              if ! echo "$master_files" | grep -qxF "$branch_file"; then
                master_matches=$(echo "$master_files" | grep "^${prefix}_" | tr '\n' ' ' | sed 's/ $//')
                echo "CONFLICT: prefix $prefix - master has '$master_matches', branch has '$branch_file'"
              fi
            fi
          done)

          if [ -n "$duplicates" ]; then
            echo "::error::Migration number collision detected!"
            echo "$duplicates"
            exit 1
          fi

          echo "Migration numbering OK"
      - run: npm run build
      - run: npm run test
