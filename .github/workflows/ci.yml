name: CI

on:
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Check migration numbering
        run: |
          set -euo pipefail
          git fetch origin master --depth=1

          # Get migration prefixes from master and this branch
          master_files=$(git ls-tree --name-only origin/master supabase/migrations/ | sed 's|supabase/migrations/||')
          branch_files=$(ls supabase/migrations/)
          master_migrations=$(echo "$master_files" | grep -oE '^[0-9]+' | LC_ALL=C sort | uniq)
          branch_migrations=$(echo "$branch_files" | grep -oE '^[0-9]+' | LC_ALL=C sort | uniq)

          # Find duplicates where the same prefix maps to different filenames
          duplicates=$(LC_ALL=C comm -12 <(echo "$master_migrations") <(echo "$branch_migrations") | while read -r prefix; do
            master_file=$(echo "$master_files" | grep "^${prefix}_")
            branch_file=$(echo "$branch_files" | grep "^${prefix}_")
            if [ "$master_file" != "$branch_file" ]; then
              echo "CONFLICT: prefix $prefix - master has '$master_file', branch has '$branch_file'"
            fi
          done)

          if [ -n "$duplicates" ]; then
            echo "::error::Migration number collision detected!"
            echo "$duplicates"
            exit 1
          fi

          echo "Migration numbering OK"
      - run: npm run build
      - run: npm run test
