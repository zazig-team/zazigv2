<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090c;
      --surface: #101216;
      --surface-raised: #161a1f;
      --border: #1e2328;
      --border-subtle: #181c21;
      --text: #e2e4e8;
      --text-secondary: #8b919a;
      --text-dim: #555d68;

      --col-ready_for_breakdown: #9b59b6;
      --col-breakdown: #8e44ad;
      --col-building: #e8a838;
      --col-combining: #e67e22;
      --col-verifying: #28b5d4;
      --col-deploying_to_test: #2980b9;
      --col-ready_to_test: #4d8fef;
      --col-deploying_to_prod: #27ae60;
      --col-complete: #3cbf6e;

      --col-ready_for_breakdown-bg: rgba(155, 89, 182, 0.06);
      --col-breakdown-bg: rgba(142, 68, 173, 0.06);
      --col-building-bg: rgba(232, 168, 56, 0.06);
      --col-combining-bg: rgba(230, 126, 34, 0.06);
      --col-verifying-bg: rgba(40, 181, 212, 0.06);
      --col-deploying_to_test-bg: rgba(41, 128, 185, 0.06);
      --col-ready_to_test-bg: rgba(77, 143, 239, 0.06);
      --col-deploying_to_prod-bg: rgba(39, 174, 96, 0.06);
      --col-complete-bg: rgba(60, 191, 110, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: auto;
    }

    /* Subtle dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #1a1e24 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────── */

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 9, 12, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--col-ready_to_test);
      box-shadow: 0 0 8px var(--col-ready_to_test), 0 0 20px rgba(77, 143, 239, 0.3);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px var(--col-ready_to_test), 0 0 20px rgba(77, 143, 239, 0.3); }
      50% { box-shadow: 0 0 12px var(--col-ready_to_test), 0 0 30px rgba(77, 143, 239, 0.5); }
    }

    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
    }

    .company-tag {
      color: var(--col-ready_to_test);
      margin-left: 4px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .last-updated {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    .refresh-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .refresh-btn:hover {
      color: var(--text);
      border-color: #2e343b;
      background: #1c2127;
    }

    .refresh-btn:disabled { opacity: 0.4; cursor: wait; }

    #message {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 0 24px;
      min-height: 0;
      transition: min-height 0.2s ease;
    }

    #message:not(:empty) {
      min-height: 36px;
      display: flex;
      align-items: center;
    }

    #message.error {
      color: #f87171;
      background: rgba(239, 68, 68, 0.08);
      border-bottom: 1px solid rgba(248, 113, 113, 0.15);
    }

    /* ── Kanban Board ──────────────────────────── */

    .board {
      display: flex;
      gap: 1px;
      flex: 1;
      min-height: 0;
      background: var(--border-subtle);
    }

    .column {
      flex: 1;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .column-header {
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .column-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .column-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .column-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .column-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-dim);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      min-width: 20px;
      text-align: center;
    }

    .column-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .column-body::-webkit-scrollbar { width: 4px; }
    .column-body::-webkit-scrollbar-track { background: transparent; }
    .column-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .column-empty {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
      padding: 32px 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      margin: 4px;
    }

    /* ── Cards (compact Trello-style) ─────────── */

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      animation: card-in 0.3s ease both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: #2a3038;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    .card:focus-visible {
      outline: 2px solid var(--col-ready_to_test);
      outline-offset: 1px;
    }

    .card-accent {
      height: 2px;
      width: 100%;
    }

    .card-body {
      padding: 12px 14px 10px;
    }

    .card-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      word-break: break-word;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .card-meta-sep {
      color: var(--border);
    }

    .card-active-label {
      color: var(--col-building);
      font-weight: 500;
    }

    .card-standalone-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      padding: 0 5px;
      margin-left: auto;
    }

    /* Progress bar at bottom of card — only for actively-working items */
    .card-progress {
      height: 3px;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
    }

    .card-progress-fill {
      height: 100%;
      border-radius: 0 3px 3px 0;
      transition: width 0.4s ease;
    }

    @keyframes progress-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .card-progress-fill.active {
      background-size: 200% 100%;
      animation: progress-shimmer 2s linear infinite;
    }

    /* ── Empty board ───────────────────────────── */

    .empty-board {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-dim);
      padding: 40px;
    }

    /* ── Detail Panel (side sheet) ─────────────── */

    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      display: flex;
      justify-content: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .detail-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-panel {
      width: 480px;
      max-width: 90vw;
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }

    .detail-overlay.open .detail-panel {
      transform: translateX(0);
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .detail-title-group {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .detail-back-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      flex-shrink: 0;
      transition: color 0.15s ease;
    }

    .detail-back-btn:hover { color: var(--text); }

    .detail-live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--col-building);
      box-shadow: 0 0 6px rgba(232, 168, 56, 0.5);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    .detail-live-dot.terminal {
      background: var(--col-complete);
      box-shadow: none;
      animation: none;
    }

    .detail-live-dot.failed {
      background: #ef4444;
      box-shadow: none;
      animation: none;
    }

    .detail-live-dot.waiting {
      background: var(--text-dim);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .detail-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-status-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      flex-shrink: 0;
    }

    .detail-close {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .detail-close:hover {
      color: var(--text);
      border-color: #2e343b;
      background: #1c2127;
    }

    /* Detail content area */
    .detail-content {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .detail-content::-webkit-scrollbar { width: 4px; }
    .detail-content::-webkit-scrollbar-track { background: transparent; }
    .detail-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Metadata rows */
    .detail-meta {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .detail-meta-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
    }

    .detail-meta-label {
      color: var(--text-dim);
      min-width: 72px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.6rem;
    }

    .detail-meta-value {
      color: var(--text-secondary);
      word-break: break-all;
    }

    /* Section headings within detail */
    .detail-section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 12px 20px 6px;
    }

    /* Job list within feature detail */
    .detail-job-list {
      padding: 6px 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .detail-job-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--surface-raised);
      border: 1px solid var(--border-subtle);
      border-radius: 7px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .detail-job-row:hover {
      border-color: #2a3038;
      background: #1a1e24;
    }

    .detail-job-row:focus-visible {
      outline: 2px solid var(--col-ready_to_test);
      outline-offset: 1px;
    }

    .detail-job-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .detail-job-dot.executing {
      background: var(--col-building);
      box-shadow: 0 0 6px rgba(232, 168, 56, 0.5);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    .detail-job-dot.queued, .detail-job-dot.dispatched {
      background: var(--text-dim);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    .detail-job-dot.complete, .detail-job-dot.done, .detail-job-dot.approved {
      background: var(--col-complete);
    }

    .detail-job-dot.failed, .detail-job-dot.verify_failed {
      background: #ef4444;
    }

    .detail-job-dot.reviewing, .detail-job-dot.verifying {
      background: var(--col-verifying);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    .detail-job-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-secondary);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-job-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
    }

    .detail-job-model {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      padding: 0 5px;
      flex-shrink: 0;
    }

    /* Context block */
    .detail-context-block {
      padding: 10px 20px 14px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .detail-context-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Log area */
    .detail-log-area {
      padding: 14px 20px;
    }

    .detail-log {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .detail-log.empty {
      color: var(--text-dim);
      font-style: italic;
    }

    .detail-footer {
      padding: 8px 20px 10px;
      border-top: 1px solid var(--border-subtle);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    /* ── Responsive ────────────────────────────── */

    @media (max-width: 900px) {
      .board {
        flex-direction: column;
        gap: 0;
      }

      .column {
        min-width: 0;
        border-bottom: 1px solid var(--border);
      }

      .column-body {
        max-height: 50vh;
      }

      .detail-panel {
        width: 100%;
        max-width: 100vw;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo"></div>
        <h1 id="boardTitle">Pipeline</h1>
      </div>
      <div class="controls">
        <span id="lastUpdated" class="last-updated"></span>
        <button id="refreshButton" class="refresh-btn" type="button">Refresh</button>
      </div>
    </header>

    <div id="message" aria-live="polite" role="status"></div>
    <main id="dashboard" class="board" aria-live="polite"></main>
  </div>

  <!-- Detail side panel -->
  <div id="detailOverlay" class="detail-overlay" role="dialog" aria-modal="true" aria-label="Detail">
    <div class="detail-panel">
      <div class="detail-header">
        <div class="detail-title-group">
          <button id="detailBackBtn" class="detail-back-btn" type="button" style="display:none">&larr; Back</button>
          <div id="detailLiveDot" class="detail-live-dot"></div>
          <span id="detailTitle" class="detail-title"></span>
          <span id="detailStatus" class="detail-status-badge"></span>
        </div>
        <button id="detailClose" class="detail-close" type="button">Close</button>
      </div>
      <div id="detailContent" class="detail-content"></div>
      <div class="detail-footer">
        <span id="detailFooterText"></span>
      </div>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      const SUPABASE_URL = 'https://jmussmwglgbwncgygzbz.supabase.co';
      const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptdXNzbXdnbGdid25jZ3lnemJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NTMyNDEsImV4cCI6MjA4NzAyOTI0MX0.bI2U8TNQ5FZ5ri3DUWJGZFuvC99WGc-fslmZZ5TcQo0';

      const FEATURES_BASE =

        SUPABASE_URL + '/rest/v1/jobs?select=id,title,status,context,branch,role,job_type,created_at,company_id&feature_id=is.null&status=not.in.(cancelled,done,complete)&job_type=not.in.(persistent_agent,verify)&order=created_at.desc&limit=100';
      const COMPANIES_BASE =

      const JOB_DETAIL_BASE =
        SUPABASE_URL + '/rest/v1/jobs?select=id,title,status,context,raw_log,model,progress,created_at,started_at,completed_at&limit=1&id=eq.';

      const AUTH_HEADERS = { apikey: ANON_KEY, Authorization: 'Bearer ' + ANON_KEY };

      // Pipeline stage order: left -> right
      const COLUMNS = [
        { key: 'ready_for_breakdown', label: 'Ready',     color: '#9b59b6' },
        { key: 'breakdown',           label: 'Breakdown', color: '#8e44ad' },
        { key: 'building',            label: 'Building',  color: '#e8a838' },
        { key: 'combining',           label: 'Combining', color: '#e67e22' },
        { key: 'verifying',           label: 'Verifying', color: '#28b5d4' },
        { key: 'deploying_to_test',   label: 'Deploying', color: '#2980b9' },
        { key: 'ready_to_test',       label: 'Testing',   color: '#4d8fef' },
        { key: 'deploying_to_prod',   label: 'To Prod',   color: '#27ae60' },
        { key: 'complete',            label: 'Complete',  color: '#3cbf6e' },
      ];

      // Only these job statuses indicate actively-working (show progress bar)
      const WORKING_JOB_STATUSES = new Set(['executing', 'reviewing']);
      const TERMINAL_JOB_STATUSES = new Set(['complete', 'failed', 'cancelled', 'done', 'approved']);

      // Map standalone job statuses to board columns
      const JOB_STATUS_TO_COLUMN = {
        queued: 'building', dispatched: 'building', executing: 'building', verify_failed: 'building',
        waiting_on_human: 'building',
        reviewing: 'verifying', verifying: 'verifying',
        testing: 'ready_to_test',
        complete: 'complete', done: 'complete', approved: 'complete',
        failed: 'building', rejected: 'building', cancelled: 'complete',
      };

      // Board elements
      const dashboardEl   = document.getElementById('dashboard');
      const messageEl     = document.getElementById('message');
      const lastUpdatedEl = document.getElementById('lastUpdated');
      const refreshButton = document.getElementById('refreshButton');
      const boardTitleEl  = document.getElementById('boardTitle');

      // Detail panel elements
      const detailOverlay  = document.getElementById('detailOverlay');
      const detailBackBtn  = document.getElementById('detailBackBtn');
      const detailLiveDot  = document.getElementById('detailLiveDot');
      const detailTitleEl  = document.getElementById('detailTitle');
      const detailStatusEl = document.getElementById('detailStatus');
      const detailContentEl = document.getElementById('detailContent');
      const detailFooterEl = document.getElementById('detailFooterText');
      const detailCloseBtn = document.getElementById('detailClose');

      // State
      let isFetching      = false;
      let activeCompanyId = null;
      let companyBlocked  = false;
      let detailPollTimer = null;
      let openDetailId    = null; // currently open feature or job ID
      let detailViewStack = []; // navigation stack for feature -> job

      // Cache last fetched features + standalone jobs for detail views
      let lastFeatures = [];
      let lastStandaloneJobs = [];

      // ── Helpers ──────────────────────────────

      function el(tag, cls, txt) {
        var e = document.createElement(tag);
        if (cls) e.className = cls;
        if (txt != null) e.textContent = txt;
        return e;
      }

      function apiFetch(url) {
        return fetch(url, { headers: AUTH_HEADERS }).then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
      }

      function formatTime(d) {
        var p = function(v) { return String(v).padStart(2, '0'); };
        return p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
      }

      function formatDate(isoStr) {
        if (!isoStr) return '\u2014';
        var d = new Date(isoStr);
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return months[d.getMonth()] + ' ' + d.getDate() + ', ' + formatTime(d);
      }

      function setMessage(text, isError) {
        messageEl.textContent = text;
        messageEl.className = isError ? 'error' : '';
      }

      function normalizeStatus(s) {
        return String(s || '').trim().toLowerCase();
      }

      function getFeatureTitle(f) {
        if (typeof f?.title === 'string' && f.title.trim()) return f.title.trim();
        if (f?.spec != null) {
          var t = typeof f.spec === 'string' ? f.spec : JSON.stringify(f.spec);
          var line = t.split(/\r?\n/, 1)[0].trim();
          if (line.length > 60) line = line.slice(0, 57) + '\u2026';
          if (line) return line;
        }
        return 'Untitled feature';
      }

      function getJobTitle(job) {
        if (typeof job?.title === 'string' && job.title.trim()) return job.title.trim();
        if (job?.context != null) {
          var t = typeof job.context === 'string' ? job.context : JSON.stringify(job.context);
          t = t.replace(/\s+/g, ' ').trim();
          // Try to extract a type field for a nicer fallback
          try {
            var parsed = JSON.parse(t);
            if (parsed.type) {
              return parsed.type.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
            }
          } catch (_) {}
          if (t.length > 50) t = t.slice(0, 47) + '\u2026';
          if (t) return t;
        }
        return 'Untitled job';
      }

      function clampProgress(v) {
        var n = Number(v);
        return Number.isFinite(n) ? Math.max(0, Math.min(100, Math.round(n))) : 0;
      }

      function sortJobs(jobs) {
        return [...jobs].sort(function(a, b) {
          var sa = Number.isFinite(Number(a?.sequence)) ? Number(a.sequence) : Infinity;
          var sb = Number.isFinite(Number(b?.sequence)) ? Number(b.sequence) : Infinity;
          if (sa !== sb) return sa - sb;
          return String(a?.created_at || '').localeCompare(String(b?.created_at || ''));
        });
      }

      function isAtBottom(el) {
        return el.scrollHeight - el.scrollTop - el.clientHeight < 40;
      }

      // ── Company / URL ────────────────────────

      function getCompanySlug() {
        var seg = window.location.pathname.replace(/^\/+/, '').replace(/\/+$/, '').split('/')[0];
        return seg || null;
      }

      async function resolveCompany(slug) {
        var rows = await apiFetch(COMPANIES_BASE + encodeURIComponent(slug));
        return Array.isArray(rows) && rows.length > 0 ? rows[0] : null;
      }

      function setBoardTitle(companyName) {
        boardTitleEl.textContent = '';
        boardTitleEl.appendChild(document.createTextNode('Pipeline'));
        if (companyName) {
          boardTitleEl.appendChild(document.createTextNode(' \u2014 '));
          var tag = document.createElement('span');
          tag.className = 'company-tag';
          tag.textContent = companyName;
          boardTitleEl.appendChild(tag);
        }
      }

      // ── Card Rendering (compact Trello-style) ─

      function renderCard(item, colDef, delay, isStandalone) {
        var card = el('div', 'card');
        card.style.animationDelay = delay + 'ms';
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');

        var accent = el('div', 'card-accent');
        accent.style.background = colDef.color;
        card.appendChild(accent);

        var body = el('div', 'card-body');

        // Title
        var title = isStandalone ? getJobTitle(item) : getFeatureTitle(item);
        body.appendChild(el('div', 'card-title', title));

        // Meta line
        var meta = el('div', 'card-meta');
        var jobs = isStandalone ? null : (Array.isArray(item?.jobs) ? item.jobs : []);

        if (isStandalone) {
          var status = normalizeStatus(item?.status);
          meta.appendChild(el('span', '', status));
          if (item?.model) {
            meta.appendChild(el('span', 'card-meta-sep', '\u00b7'));
            meta.appendChild(el('span', '',
              String(item.model).replace('claude-', '').replace('-4-6', '')));
          }
          meta.appendChild(el('span', 'card-standalone-badge', 'standalone'));
        } else if (jobs && jobs.length > 0) {
          var doneCount = jobs.filter(function(j) {
            var s = normalizeStatus(j?.status);
            return s === 'complete' || s === 'done' || s === 'approved';
          }).length;
          meta.appendChild(el('span', '', doneCount + '/' + jobs.length + ' done'));

          var activeJobs = jobs.filter(function(j) {
            return WORKING_JOB_STATUSES.has(normalizeStatus(j?.status));
          });
          if (activeJobs.length > 0) {
            meta.appendChild(el('span', 'card-meta-sep', '\u00b7'));
            meta.appendChild(el('span', 'card-active-label',
              activeJobs.length + ' active'));
          }
        }

        body.appendChild(meta);
        card.appendChild(body);

        // Progress bar — ONLY if there's an actively-working job
        var activeJob = null;
        if (isStandalone) {
          if (WORKING_JOB_STATUSES.has(normalizeStatus(item?.status))) {
            activeJob = item;
          }
        } else if (jobs) {
          activeJob = jobs.find(function(j) {
            return WORKING_JOB_STATUSES.has(normalizeStatus(j?.status));
          });
        }

        if (activeJob) {
          var progress = clampProgress(activeJob.progress);
          var track = el('div', 'card-progress');
          var fill = el('div', 'card-progress-fill active');
          fill.style.width = Math.max(progress, 5) + '%';
          fill.style.background = 'linear-gradient(90deg, ' + colDef.color + ', ' +
            colDef.color + 'aa, ' + colDef.color + ')';
          track.appendChild(fill);
          card.appendChild(track);
        }

        // Click handler
        var itemId = String(item?.id ?? '');
        function handleOpen() {
          if (isStandalone) {
            openJobDetail(itemId);
          } else {
            openFeatureDetail(item);
          }
        }
        card.addEventListener('click', handleOpen);
        card.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleOpen(); }
        });

        return card;
      }

      function renderColumn(colDef, features, standaloneJobs) {
        var col = el('div', 'column');
        var totalCount = features.length + standaloneJobs.length;

        var hdr = el('div', 'column-header');
        var titleGroup = el('div', 'column-title');
        var dot = el('div', 'column-dot');
        dot.style.background = colDef.color;
        titleGroup.appendChild(dot);
        titleGroup.appendChild(el('span', 'column-name', colDef.label));
        hdr.appendChild(titleGroup);
        hdr.appendChild(el('span', 'column-count', String(totalCount)));
        col.appendChild(hdr);

        var body = el('div', 'column-body');
        if (totalCount === 0) {
          body.appendChild(el('div', 'column-empty', 'No items'));
        } else {
          var idx = 0;
          for (var i = 0; i < features.length; i++) {
            body.appendChild(renderCard(features[i], colDef, idx * 50, false));
            idx++;
          }
          for (var j = 0; j < standaloneJobs.length; j++) {
            body.appendChild(renderCard(standaloneJobs[j], colDef, idx * 50, true));
            idx++;
          }
        }
        col.appendChild(body);
        return col;
      }

      function renderBoard(features, standaloneJobs) {
        // Group features by status
        var featuresByCol = {};
        var jobsByCol = {};
        for (var c = 0; c < COLUMNS.length; c++) {
          featuresByCol[COLUMNS[c].key] = [];
          jobsByCol[COLUMNS[c].key] = [];
        }

        for (var i = 0; i < features.length; i++) {
          var s = normalizeStatus(features[i]?.status);
          if (s !== 'cancelled' && featuresByCol[s]) featuresByCol[s].push(features[i]);
        }

        // Group standalone jobs by mapped column
        for (var j = 0; j < standaloneJobs.length; j++) {
          var js = normalizeStatus(standaloneJobs[j]?.status);
          var col = JOB_STATUS_TO_COLUMN[js] || 'building';
          if (jobsByCol[col]) jobsByCol[col].push(standaloneJobs[j]);
        }

        var total = 0;
        var frag = document.createDocumentFragment();
        for (var c = 0; c < COLUMNS.length; c++) {
          var key = COLUMNS[c].key;
          var colFeatures = featuresByCol[key] || [];
          var colJobs = jobsByCol[key] || [];
          total += colFeatures.length + colJobs.length;
          frag.appendChild(renderColumn(COLUMNS[c], colFeatures, colJobs));
        }

        dashboardEl.replaceChildren(frag);
        if (total === 0) dashboardEl.replaceChildren(el('div', 'empty-board', 'No active features'));
      }

      // ── Data Fetch ─────────────────────────

      async function fetchFeatures() {
        var url = FEATURES_BASE;
        if (activeCompanyId) url += '&company_id=eq.' + encodeURIComponent(activeCompanyId);
        var payload = await apiFetch(url);
        return Array.isArray(payload) ? payload : [];
      }

      async function fetchStandaloneJobs() {
        if (!activeCompanyId) return [];
        var url = STANDALONE_JOBS_BASE;
        if (activeCompanyId) url += '&company_id=eq.' + encodeURIComponent(activeCompanyId);
        var payload = await apiFetch(url);
        return Array.isArray(payload) ? payload : [];
      }

      async function refreshDashboard() {
        if (isFetching || companyBlocked) return;
        isFetching = true;
        refreshButton.disabled = true;
        try {
          var results = await Promise.all([fetchFeatures(), fetchStandaloneJobs()]);
          lastFeatures = results[0];
          lastStandaloneJobs = results[1];
          renderBoard(lastFeatures, lastStandaloneJobs);
          setMessage('');
          lastUpdatedEl.textContent = formatTime(new Date());
        } catch (_) {
          setMessage('Failed to load \u2014 retrying in 30s', true);
        } finally {
          isFetching = false;
          refreshButton.disabled = false;
        }
      }

      // ── Detail Panel: Feature View ─────────

      function openFeatureDetail(feature) {
        stopDetailPoll();
        detailViewStack = [];
        openDetailId = feature.id;

        var status = normalizeStatus(feature.status);
        var terminal = TERMINAL_JOB_STATUSES.has(status);

        detailBackBtn.style.display = 'none';
        detailLiveDot.className = 'detail-live-dot' + (terminal ? ' terminal' : ' waiting');
        detailTitleEl.textContent = getFeatureTitle(feature);
        detailStatusEl.textContent = status;
        detailFooterEl.textContent = '';

        // Build content
        detailContentEl.textContent = '';

        // Metadata
        var metaDiv = el('div', 'detail-meta');

        function addMeta(label, value) {
          var row = el('div', 'detail-meta-row');
          row.appendChild(el('span', 'detail-meta-label', label));
          row.appendChild(el('span', 'detail-meta-value', value));
          metaDiv.appendChild(row);
        }

        if (feature.branch) addMeta('Branch', feature.branch);
        addMeta('Created', formatDate(feature.created_at));
        if (feature.updated_at) addMeta('Updated', formatDate(feature.updated_at));
        if (feature.created_by) addMeta('By', feature.created_by);

        detailContentEl.appendChild(metaDiv);

        // Jobs section
        var jobs = Array.isArray(feature.jobs) ? sortJobs(feature.jobs) : [];
        if (jobs.length > 0) {
          detailContentEl.appendChild(el('div', 'detail-section-title',
            'Jobs (' + jobs.length + ')'));
          var jobList = el('div', 'detail-job-list');

          for (var i = 0; i < jobs.length; i++) {
            (function(job) {
              var jStatus = normalizeStatus(job.status);
              var row = el('div', 'detail-job-row');
              row.setAttribute('role', 'button');
              row.setAttribute('tabindex', '0');

              row.appendChild(el('div', 'detail-job-dot ' + jStatus));
              row.appendChild(el('span', 'detail-job-name', getJobTitle(job)));
              row.appendChild(el('span', 'detail-job-status', jStatus));

              if (job.model) {
                row.appendChild(el('span', 'detail-job-model',
                  String(job.model).replace('claude-', '').replace('-4-6', '')));
              }

              function goToJob() {
                detailViewStack.push({ type: 'feature', data: feature });
                openJobDetail(String(job.id));
              }
              row.addEventListener('click', goToJob);
              row.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goToJob(); }
              });

              jobList.appendChild(row);
            })(jobs[i]);
          }

          detailContentEl.appendChild(jobList);
        }

        // Context / spec
        if (feature.spec) {
          detailContentEl.appendChild(el('div', 'detail-section-title', 'Spec'));
          var ctxBlock = el('div', 'detail-context-block');
          var ctxText = el('div', 'detail-context-text');
          ctxText.textContent = typeof feature.spec === 'string'
            ? feature.spec : JSON.stringify(feature.spec, null, 2);
          ctxBlock.appendChild(ctxText);
          detailContentEl.appendChild(ctxBlock);
        }

        // Acceptance tests
        if (feature.acceptance_tests) {
          detailContentEl.appendChild(el('div', 'detail-section-title', 'Acceptance Tests'));
          var atBlock = el('div', 'detail-context-block');
          var atText = el('div', 'detail-context-text');
          atText.textContent = feature.acceptance_tests;
          atBlock.appendChild(atText);
          detailContentEl.appendChild(atBlock);
        }

        detailOverlay.classList.add('open');
      }

      // ── Detail Panel: Job View ─────────────

      async function openJobDetail(jobId) {
        stopDetailPoll();
        openDetailId = jobId;

        detailBackBtn.style.display = detailViewStack.length > 0 ? '' : 'none';
        detailLiveDot.className = 'detail-live-dot';
        detailTitleEl.textContent = 'Loading\u2026';
        detailStatusEl.textContent = '';
        detailContentEl.textContent = '';
        detailFooterEl.textContent = '';

        detailOverlay.classList.add('open');

        try {
          var job = await apiFetch(JOB_DETAIL_BASE + encodeURIComponent(jobId));
          job = Array.isArray(job) && job.length > 0 ? job[0] : null;

          if (openDetailId !== jobId) return;

          if (!job) {
            detailTitleEl.textContent = 'Job not found';
            detailStatusEl.textContent = 'not found';
            return;
          }

          applyJobToPanel(job);

          var terminal = TERMINAL_JOB_STATUSES.has(normalizeStatus(job.status));
          if (!terminal) {
            detailPollTimer = setInterval(async function() {
              if (openDetailId !== jobId) return;
              try {
                var updated = await apiFetch(JOB_DETAIL_BASE + encodeURIComponent(jobId));
                updated = Array.isArray(updated) && updated.length > 0 ? updated[0] : null;
                if (openDetailId !== jobId || !updated) return;
                applyJobToPanel(updated);
                if (TERMINAL_JOB_STATUSES.has(normalizeStatus(updated.status))) {
                  stopDetailPoll();
                }
              } catch (_) { /* ignore transient poll errors */ }
            }, 5000);
          }
        } catch (_) {
          if (openDetailId !== jobId) return;
          detailTitleEl.textContent = 'Failed to load job';
          detailStatusEl.textContent = 'error';
        }
      }

      function applyJobToPanel(job) {
        var status = normalizeStatus(job.status);
        var terminal = TERMINAL_JOB_STATUSES.has(status);
        var failed = status === 'failed' || status === 'verify_failed';

        detailLiveDot.className = 'detail-live-dot' +
          (failed ? ' failed' : terminal ? ' terminal' :
           WORKING_JOB_STATUSES.has(status) ? '' : ' waiting');
        detailTitleEl.textContent = getJobTitle(job);
        detailStatusEl.textContent = status;

        // Snapshot scroll position before rebuild
        var wasAtBottom = isAtBottom(detailContentEl);
        var prevScrollTop = detailContentEl.scrollTop;

        // Build content
        detailContentEl.textContent = '';

        // Metadata
        var metaDiv = el('div', 'detail-meta');
        function addMeta(label, value) {
          var row = el('div', 'detail-meta-row');
          row.appendChild(el('span', 'detail-meta-label', label));
          row.appendChild(el('span', 'detail-meta-value', value));
          metaDiv.appendChild(row);
        }

        if (job.model) addMeta('Model', job.model);
        if (job.progress != null) addMeta('Progress', clampProgress(job.progress) + '%');
        addMeta('Created', formatDate(job.created_at));
        if (job.started_at) addMeta('Started', formatDate(job.started_at));
        if (job.completed_at) addMeta('Completed', formatDate(job.completed_at));

        detailContentEl.appendChild(metaDiv);

        // Context
        if (job.context != null) {
          detailContentEl.appendChild(el('div', 'detail-section-title', 'Context'));
          var ctxBlock = el('div', 'detail-context-block');
          var ctxText = el('div', 'detail-context-text');
          var raw = typeof job.context === 'string' ? job.context : JSON.stringify(job.context);
          // Try to pretty-print JSON context
          try {
            ctxText.textContent = JSON.stringify(JSON.parse(raw), null, 2);
          } catch (_) {
            ctxText.textContent = raw;
          }
          ctxBlock.appendChild(ctxText);
          detailContentEl.appendChild(ctxBlock);
        }

        // Log
        detailContentEl.appendChild(el('div', 'detail-section-title', 'Log'));
        var logArea = el('div', 'detail-log-area');
        var logPre = el('pre', typeof job.raw_log === 'string' && job.raw_log ? 'detail-log' : 'detail-log empty');
        logPre.textContent = typeof job.raw_log === 'string' && job.raw_log
          ? job.raw_log : 'No log output yet\u2026';
        logArea.appendChild(logPre);
        detailContentEl.appendChild(logArea);

        // Restore scroll position after rebuild
        if (wasAtBottom) {
          detailContentEl.scrollTop = detailContentEl.scrollHeight;
        } else {
          detailContentEl.scrollTop = prevScrollTop;
        }

        detailFooterEl.textContent = terminal
          ? 'Job ' + status + ' \u2014 log frozen'
          : 'Live \u2014 refreshing every 5s';
      }

      // ── Detail Panel: Navigation & Close ───

      function stopDetailPoll() {
        if (detailPollTimer !== null) {
          clearInterval(detailPollTimer);
          detailPollTimer = null;
        }
      }

      function closeDetail() {
        stopDetailPoll();
        openDetailId = null;
        detailViewStack = [];
        detailOverlay.classList.remove('open');
        detailContentEl.textContent = '';
        detailTitleEl.textContent = '';
        detailStatusEl.textContent = '';
        detailFooterEl.textContent = '';
      }

      detailBackBtn.addEventListener('click', function() {
        if (detailViewStack.length === 0) return;
        var prev = detailViewStack.pop();
        if (prev.type === 'feature') {
          openFeatureDetail(prev.data);
        }
      });

      detailOverlay.addEventListener('click', function(e) {
        if (e.target === detailOverlay) closeDetail();
      });
      detailCloseBtn.addEventListener('click', closeDetail);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && detailOverlay.classList.contains('open')) closeDetail();
      });

      // ── Bootstrap ────────────────────────────

      async function init() {
        var slug = getCompanySlug();

        if (slug) {
          try {
            var company = await resolveCompany(slug);
            if (!company) {
              companyBlocked = true;
              refreshButton.disabled = true;
              setMessage('Company not found: ' + slug, true);
              dashboardEl.replaceChildren(el('div', 'empty-board', 'Company not found: ' + slug));
              return;
            }
            activeCompanyId = company.id;
            setBoardTitle(company.name);
          } catch (_) {
            companyBlocked = true;
            refreshButton.disabled = true;
            setMessage('Failed to resolve company \u2014 ' + slug, true);
            return;
          }
        } else {
          setBoardTitle(null);
        }

        refreshButton.addEventListener('click', function() { void refreshDashboard(); });
        void refreshDashboard();
        setInterval(function() { void refreshDashboard(); }, 30000);
      }

      void init();
    })();
  </script>
</body>
</html>
