<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090c;
      --surface: #101216;
      --surface-raised: #161a1f;
      --border: #1e2328;
      --border-subtle: #181c21;
      --text: #e2e4e8;
      --text-secondary: #8b919a;
      --text-dim: #555d68;

      --col-design: #c471ed;
      --col-building: #e8a838;
      --col-testing: #4d8fef;
      --col-verifying: #28b5d4;
      --col-done: #3cbf6e;

      --col-design-bg: rgba(196, 113, 237, 0.06);
      --col-building-bg: rgba(232, 168, 56, 0.06);
      --col-testing-bg: rgba(77, 143, 239, 0.06);
      --col-verifying-bg: rgba(40, 181, 212, 0.06);
      --col-done-bg: rgba(60, 191, 110, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: auto;
    }

    /* Subtle dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #1a1e24 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────── */

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 9, 12, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--col-testing);
      box-shadow: 0 0 8px var(--col-testing), 0 0 20px rgba(77, 143, 239, 0.3);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px var(--col-testing), 0 0 20px rgba(77, 143, 239, 0.3); }
      50% { box-shadow: 0 0 12px var(--col-testing), 0 0 30px rgba(77, 143, 239, 0.5); }
    }

    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
    }

    .company-tag {
      color: var(--col-testing);
      margin-left: 4px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .last-updated {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    .refresh-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .refresh-btn:hover {
      color: var(--text);
      border-color: #2e343b;
      background: #1c2127;
    }

    .refresh-btn:disabled { opacity: 0.4; cursor: wait; }

    #message {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 0 24px;
      min-height: 0;
      transition: min-height 0.2s ease;
    }

    #message:not(:empty) {
      min-height: 36px;
      display: flex;
      align-items: center;
    }

    #message.error {
      color: #f87171;
      background: rgba(239, 68, 68, 0.08);
      border-bottom: 1px solid rgba(248, 113, 113, 0.15);
    }

    /* ── Kanban Board ──────────────────────────── */

    .board {
      display: flex;
      gap: 1px;
      flex: 1;
      min-height: 0;
      background: var(--border-subtle);
    }

    .column {
      flex: 1;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .column-header {
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .column-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .column-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .column-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .column-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-dim);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      min-width: 20px;
      text-align: center;
    }

    .column-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .column-body::-webkit-scrollbar { width: 4px; }
    .column-body::-webkit-scrollbar-track { background: transparent; }
    .column-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .column-empty {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
      padding: 32px 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      margin: 4px;
    }

    /* ── Feature Cards ─────────────────────────── */

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      animation: card-in 0.3s ease both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: #2a3038;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    .card-accent {
      height: 2px;
      width: 100%;
    }

    .card-body {
      padding: 12px 14px;
    }

    .card-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 10px;
      word-break: break-word;
    }

    /* ── Jobs inside cards ─────────────────────── */

    .card-jobs {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .job-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 10px;
      background: var(--surface-raised);
      border: 1px solid var(--border-subtle);
      border-radius: 7px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .job-row:hover {
      border-color: #2a3038;
      background: #1a1e24;
    }

    .job-row:focus-visible {
      outline: 2px solid var(--col-testing);
      outline-offset: 1px;
    }

    .job-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .job-info {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex: 1;
    }

    .job-status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .job-status-dot.executing {
      background: var(--col-building);
      box-shadow: 0 0 6px rgba(232, 168, 56, 0.5);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    .job-status-dot.queued, .job-status-dot.dispatched {
      background: var(--text-dim);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    .job-status-dot.complete { background: var(--col-done); }
    .job-status-dot.failed { background: #ef4444; }
    .job-status-dot.reviewing { background: var(--col-verifying); animation: dot-pulse 2s ease-in-out infinite; }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .job-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .job-model-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      padding: 0 5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .job-progress-track {
      height: 3px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 3px;
      overflow: hidden;
    }

    .job-progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .card-footer {
      padding: 8px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border-subtle);
    }

    .card-job-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .card-progress-summary {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    /* ── Empty board ───────────────────────────── */

    .empty-board {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-dim);
      padding: 40px;
    }

    /* ── Job Detail Panel (bottom sheet) ───────── */

    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .detail-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-panel {
      width: 100%;
      max-height: 70vh;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.25s ease;
    }

    .detail-overlay.open .detail-panel {
      transform: translateY(0);
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .detail-title-group {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .detail-live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--col-building);
      box-shadow: 0 0 6px rgba(232, 168, 56, 0.5);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    .detail-live-dot.terminal {
      background: var(--col-done);
      box-shadow: none;
      animation: none;
    }

    .detail-live-dot.failed {
      background: #ef4444;
      box-shadow: none;
      animation: none;
    }

    .detail-job-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-status-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      flex-shrink: 0;
    }

    .detail-close {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .detail-close:hover {
      color: var(--text);
      border-color: #2e343b;
      background: #1c2127;
    }

    .detail-context {
      padding: 10px 18px;
      border-bottom: 1px solid var(--border-subtle);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .detail-log-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      min-height: 0;
    }

    .detail-log-wrap::-webkit-scrollbar { width: 4px; }
    .detail-log-wrap::-webkit-scrollbar-track { background: transparent; }
    .detail-log-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .detail-log {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .detail-log.empty {
      color: var(--text-dim);
      font-style: italic;
    }

    .detail-footer {
      padding: 8px 18px 10px;
      border-top: 1px solid var(--border-subtle);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    /* ── Responsive ────────────────────────────── */

    @media (max-width: 900px) {
      .board {
        flex-direction: column;
        gap: 0;
      }

      .column {
        min-width: 0;
        border-bottom: 1px solid var(--border);
      }

      .column-body {
        max-height: 50vh;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo"></div>
        <h1 id="boardTitle">Pipeline</h1>
      </div>
      <div class="controls">
        <span id="lastUpdated" class="last-updated"></span>
        <button id="refreshButton" class="refresh-btn" type="button">Refresh</button>
      </div>
    </header>

    <div id="message" aria-live="polite" role="status"></div>
    <main id="dashboard" class="board" aria-live="polite"></main>
  </div>

  <!-- Job detail bottom sheet -->
  <div id="detailOverlay" class="detail-overlay" role="dialog" aria-modal="true" aria-label="Job detail">
    <div class="detail-panel">
      <div class="detail-header">
        <div class="detail-title-group">
          <div id="detailLiveDot" class="detail-live-dot"></div>
          <span id="detailJobId" class="detail-job-id"></span>
          <span id="detailStatus" class="detail-status-badge"></span>
        </div>
        <button id="detailClose" class="detail-close" type="button">Close</button>
      </div>
      <div id="detailContext" class="detail-context" style="display:none"></div>
      <div id="detailLogWrap" class="detail-log-wrap">
        <pre id="detailLog" class="detail-log empty">Loading&#8230;</pre>
      </div>
      <div class="detail-footer">
        <span id="detailFooterText"></span>
      </div>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      const SUPABASE_URL = 'https://jmussmwglgbwncgygzbz.supabase.co';
      const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptdXNzbXdnbGdid25jZ3lnemJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NTMyNDEsImV4cCI6MjA4NzAyOTI0MX0.bI2U8TNQ5FZ5ri3DUWJGZFuvC99WGc-fslmZZ5TcQo0';

      const FEATURES_BASE =
        SUPABASE_URL + '/rest/v1/features?select=*,jobs(*)&status=not.eq.cancelled&order=created_at.desc';
      const COMPANIES_BASE =
        SUPABASE_URL + '/rest/v1/companies?select=id,name&limit=1&name=eq.';
      const JOBS_BASE =
        SUPABASE_URL + '/rest/v1/jobs?select=id,status,context,raw_log,model,progress&limit=1&id=eq.';

      const AUTH_HEADERS = { apikey: ANON_KEY, Authorization: 'Bearer ' + ANON_KEY };

      // Pipeline stage order: left → right
      const COLUMNS = [
        { key: 'design',    label: 'Design',    color: '#c471ed' },
        { key: 'building',  label: 'Building',  color: '#e8a838' },
        { key: 'testing',   label: 'Testing',   color: '#4d8fef' },
        { key: 'verifying', label: 'Verifying', color: '#28b5d4' },
        { key: 'done',      label: 'Done',      color: '#3cbf6e' },
      ];

      const ACTIVE_JOB_STATUSES   = new Set(['queued', 'dispatched', 'executing', 'reviewing']);
      const TERMINAL_JOB_STATUSES = new Set(['complete', 'failed', 'cancelled']);

      // Board elements
      const dashboardEl   = document.getElementById('dashboard');
      const messageEl     = document.getElementById('message');
      const lastUpdatedEl = document.getElementById('lastUpdated');
      const refreshButton = document.getElementById('refreshButton');
      const boardTitleEl  = document.getElementById('boardTitle');

      // Detail panel elements
      const detailOverlay   = document.getElementById('detailOverlay');
      const detailLiveDot   = document.getElementById('detailLiveDot');
      const detailJobIdEl   = document.getElementById('detailJobId');
      const detailStatusEl  = document.getElementById('detailStatus');
      const detailContextEl = document.getElementById('detailContext');
      const detailLogWrap   = document.getElementById('detailLogWrap');
      const detailLogEl     = document.getElementById('detailLog');
      const detailFooterEl  = document.getElementById('detailFooterText');
      const detailCloseBtn  = document.getElementById('detailClose');

      // State
      let isFetching      = false;
      let activeCompanyId = null;   // null = all companies
      let companyBlocked  = false;  // true if company lookup failed

      let openJobId       = null;   // currently open job ID in detail panel
      let detailPollTimer = null;

      // ── Helpers ──────────────────────────────

      function el(tag, cls, txt) {
        var e = document.createElement(tag);
        if (cls) e.className = cls;
        if (txt != null) e.textContent = txt;
        return e;
      }

      function apiFetch(url) {
        return fetch(url, { headers: AUTH_HEADERS }).then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
      }

      function formatTime(d) {
        var p = function(v) { return String(v).padStart(2, '0'); };
        return p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
      }

      function setMessage(text, isError) {
        messageEl.textContent = text;
        messageEl.className = isError ? 'error' : '';
      }

      function normalizeStatus(s) {
        return String(s || '').trim().toLowerCase();
      }

      function getFeatureName(f) {
        if (typeof f?.name === 'string' && f.name.trim()) return f.name.trim();
        if (f?.spec != null) {
          var t = typeof f.spec === 'string' ? f.spec : JSON.stringify(f.spec);
          var line = t.split(/\r?\n/, 1)[0].trim();
          if (line) return line;
        }
        return String(f?.id ?? 'feature');
      }

      function clampProgress(v) {
        var n = Number(v);
        return Number.isFinite(n) ? Math.max(0, Math.min(100, Math.round(n))) : 0;
      }

      function getJobSummary(job) {
        var fb = String(job?.id ?? 'job');
        if (job?.context == null) return fb;
        var t = typeof job.context === 'string' ? job.context : JSON.stringify(job.context);
        t = t.replace(/\s+/g, ' ').trim();
        if (!t) return fb;
        return t.length > 50 ? t.slice(0, 47) + '\u2026' : t;
      }

      function sortJobs(jobs) {
        return [...jobs].sort(function(a, b) {
          var sa = Number.isFinite(Number(a?.sequence)) ? Number(a.sequence) : Infinity;
          var sb = Number.isFinite(Number(b?.sequence)) ? Number(b.sequence) : Infinity;
          if (sa !== sb) return sa - sb;
          return String(a?.created_at || '').localeCompare(String(b?.created_at || ''));
        });
      }

      function jobProgressColor(status, colDef) {
        if (status === 'complete') return 'var(--col-done)';
        if (status === 'failed')   return '#ef4444';
        return colDef.color;
      }

      function isAtBottom(el) {
        return el.scrollHeight - el.scrollTop - el.clientHeight < 40;
      }

      // ── Company / URL ────────────────────────

      function getCompanySlug() {
        var seg = window.location.pathname.replace(/^\/+/, '').replace(/\/+$/, '').split('/')[0];
        return seg || null;
      }

      async function resolveCompany(slug) {
        var rows = await apiFetch(COMPANIES_BASE + encodeURIComponent(slug));
        return Array.isArray(rows) && rows.length > 0 ? rows[0] : null;
      }

      function setBoardTitle(companyName) {
        // Always use textContent / DOM nodes — never innerHTML with dynamic strings
        boardTitleEl.textContent = '';
        boardTitleEl.appendChild(document.createTextNode('Pipeline'));
        if (companyName) {
          boardTitleEl.appendChild(document.createTextNode(' \u2014 '));
          var tag = document.createElement('span');
          tag.className = 'company-tag';
          tag.textContent = companyName;
          boardTitleEl.appendChild(tag);
        }
      }

      // ── DOM Builders ─────────────────────────

      function renderJobRow(job, colDef) {
        var status = normalizeStatus(job?.status);
        var row = el('div', 'job-row');
        row.setAttribute('role', 'button');
        row.setAttribute('tabindex', '0');
        row.setAttribute('aria-label', 'View log for job ' + String(job?.id ?? ''));

        var header = el('div', 'job-header');
        var info = el('div', 'job-info');
        info.appendChild(el('div', 'job-status-dot ' + status));
        info.appendChild(el('span', 'job-name', getJobSummary(job)));
        header.appendChild(info);

        if (job?.model) {
          header.appendChild(el('span', 'job-model-tag',
            String(job.model).replace('claude-', '').replace('-4-6', '')));
        }

        row.appendChild(header);

        var progress = clampProgress(job?.progress);
        if (progress > 0 || ACTIVE_JOB_STATUSES.has(status)) {
          var track = el('div', 'job-progress-track');
          var fill = el('div', 'job-progress-fill');
          fill.style.width = progress + '%';
          fill.style.background = jobProgressColor(status, colDef);
          track.appendChild(fill);
          row.appendChild(track);
        }

        var jobId = String(job?.id ?? '');
        function handleOpen() { if (jobId) openJobDetail(jobId); }
        row.addEventListener('click', handleOpen);
        row.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleOpen(); }
        });

        return row;
      }

      function renderCard(feature, colDef, delay) {
        var card = el('div', 'card');
        card.style.animationDelay = delay + 'ms';

        var accent = el('div', 'card-accent');
        accent.style.background = colDef.color;
        card.appendChild(accent);

        var body = el('div', 'card-body');
        body.appendChild(el('div', 'card-title', getFeatureName(feature)));

        var jobs = Array.isArray(feature?.jobs) ? sortJobs(feature.jobs) : [];
        if (jobs.length > 0) {
          var jobsWrap = el('div', 'card-jobs');
          for (var i = 0; i < jobs.length; i++) {
            jobsWrap.appendChild(renderJobRow(jobs[i], colDef));
          }
          body.appendChild(jobsWrap);
        }

        card.appendChild(body);

        if (jobs.length > 0) {
          var footer = el('div', 'card-footer');
          footer.appendChild(el('span', 'card-job-count',
            jobs.length + (jobs.length === 1 ? ' job' : ' jobs')));
          var done = jobs.filter(function(j) {
            return normalizeStatus(j?.status) === 'complete';
          }).length;
          footer.appendChild(el('span', 'card-progress-summary', done + '/' + jobs.length + ' done'));
          card.appendChild(footer);
        }

        return card;
      }

      function renderColumn(colDef, features) {
        var col = el('div', 'column');

        var hdr = el('div', 'column-header');
        var titleGroup = el('div', 'column-title');
        var dot = el('div', 'column-dot');
        dot.style.background = colDef.color;
        titleGroup.appendChild(dot);
        titleGroup.appendChild(el('span', 'column-name', colDef.label));
        hdr.appendChild(titleGroup);
        hdr.appendChild(el('span', 'column-count', String(features.length)));
        col.appendChild(hdr);

        var body = el('div', 'column-body');
        if (features.length === 0) {
          body.appendChild(el('div', 'column-empty', 'No features'));
        } else {
          for (var i = 0; i < features.length; i++) {
            body.appendChild(renderCard(features[i], colDef, i * 50));
          }
        }
        col.appendChild(body);
        return col;
      }

      function renderBoard(features) {
        var grouped = {};
        for (var c = 0; c < COLUMNS.length; c++) grouped[COLUMNS[c].key] = [];

        for (var i = 0; i < features.length; i++) {
          var s = normalizeStatus(features[i]?.status);
          if (s !== 'cancelled' && grouped[s]) grouped[s].push(features[i]);
        }

        var total = 0;
        var frag = document.createDocumentFragment();
        for (var c = 0; c < COLUMNS.length; c++) {
          var cols = grouped[COLUMNS[c].key] || [];
          total += cols.length;
          frag.appendChild(renderColumn(COLUMNS[c], cols));
        }

        dashboardEl.replaceChildren(frag);
        if (total === 0) dashboardEl.replaceChildren(el('div', 'empty-board', 'No active features'));
      }

      // ── Board Data Fetch ─────────────────────

      async function fetchFeatures() {
        var url = FEATURES_BASE;
        if (activeCompanyId) url += '&company_id=eq.' + encodeURIComponent(activeCompanyId);
        var payload = await apiFetch(url);
        return Array.isArray(payload) ? payload : [];
      }

      async function refreshDashboard() {
        if (isFetching || companyBlocked) return;
        isFetching = true;
        refreshButton.disabled = true;
        try {
          renderBoard(await fetchFeatures());
          setMessage('');
          lastUpdatedEl.textContent = formatTime(new Date());
        } catch (_) {
          setMessage('Failed to load \u2014 retrying in 30s', true);
        } finally {
          isFetching = false;
          refreshButton.disabled = false;
        }
      }

      // ── Job Detail Panel ─────────────────────

      async function fetchJob(jobId) {
        var rows = await apiFetch(JOBS_BASE + encodeURIComponent(jobId));
        return Array.isArray(rows) && rows.length > 0 ? rows[0] : null;
      }

      function applyJobToPanel(job) {
        if (!job) return false;
        var status = normalizeStatus(job.status);
        var terminal = TERMINAL_JOB_STATUSES.has(status);
        var failed   = status === 'failed';

        // Live dot state (all textContent-safe — class names only)
        detailLiveDot.className = 'detail-live-dot' + (failed ? ' failed' : terminal ? ' terminal' : '');
        detailStatusEl.textContent = status;

        // Context (textContent — safe)
        var ctx = '';
        if (job.context != null) {
          var raw = typeof job.context === 'string' ? job.context : JSON.stringify(job.context);
          raw = raw.replace(/\s+/g, ' ').trim();
          ctx = raw.length > 120 ? raw.slice(0, 117) + '\u2026' : raw;
        }
        if (ctx) {
          detailContextEl.textContent = ctx;
          detailContextEl.style.display = '';
        } else {
          detailContextEl.style.display = 'none';
        }

        // Log content (textContent — preserves all chars, XSS-safe)
        var atBottom = isAtBottom(detailLogWrap);
        var logText = typeof job.raw_log === 'string' ? job.raw_log : '';
        if (logText) {
          detailLogEl.className = 'detail-log';
          detailLogEl.textContent = logText;
        } else {
          detailLogEl.className = 'detail-log empty';
          detailLogEl.textContent = 'No log output yet\u2026';
        }

        // Auto-scroll if user was already at bottom
        if (atBottom) detailLogWrap.scrollTop = detailLogWrap.scrollHeight;

        detailFooterEl.textContent = terminal
          ? 'Job ' + status + ' \u2014 log frozen'
          : 'Live \u2014 refreshing every 5s';

        return terminal;
      }

      function stopDetailPoll() {
        if (detailPollTimer !== null) {
          clearInterval(detailPollTimer);
          detailPollTimer = null;
        }
      }

      function closeDetail() {
        stopDetailPoll();
        openJobId = null;
        detailOverlay.classList.remove('open');
        // Reset panel contents
        detailLogEl.className = 'detail-log empty';
        detailLogEl.textContent = 'Loading\u2026';
        detailJobIdEl.textContent = '';
        detailStatusEl.textContent = '';
        detailContextEl.textContent = '';
        detailContextEl.style.display = 'none';
        detailFooterEl.textContent = '';
      }

      async function openJobDetail(jobId) {
        stopDetailPoll();
        openJobId = jobId;

        // Show skeleton while loading
        var shortId = jobId.slice(0, 8) + '\u2026';
        detailJobIdEl.textContent = shortId;
        detailStatusEl.textContent = 'loading\u2026';
        detailLiveDot.className = 'detail-live-dot';
        detailLogEl.className = 'detail-log empty';
        detailLogEl.textContent = 'Loading\u2026';
        detailContextEl.style.display = 'none';
        detailFooterEl.textContent = '';

        detailOverlay.classList.add('open');

        try {
          var job = await fetchJob(jobId);
          if (openJobId !== jobId) return; // panel was closed or another job opened

          if (!job) {
            detailLogEl.className = 'detail-log empty';
            detailLogEl.textContent = 'Job not found';
            detailStatusEl.textContent = 'not found';
            return;
          }

          detailJobIdEl.textContent = String(job.id ?? jobId).slice(0, 8) + '\u2026';
          var terminal = applyJobToPanel(job);
          if (terminal) return; // no polling needed for finished jobs

          // Poll every 5s while job is active
          detailPollTimer = setInterval(async function() {
            if (openJobId !== jobId) return;
            try {
              var updated = await fetchJob(jobId);
              if (openJobId !== jobId) return;
              if (updated && applyJobToPanel(updated)) {
                stopDetailPoll(); // job reached terminal state
              }
            } catch (_) { /* ignore transient poll errors */ }
          }, 5000);

        } catch (_) {
          if (openJobId !== jobId) return;
          detailLogEl.className = 'detail-log empty';
          detailLogEl.textContent = 'Failed to load job';
          detailStatusEl.textContent = 'error';
        }
      }

      // Close on backdrop click, button, or Escape
      detailOverlay.addEventListener('click', function(e) {
        if (e.target === detailOverlay) closeDetail();
      });
      detailCloseBtn.addEventListener('click', closeDetail);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && detailOverlay.classList.contains('open')) closeDetail();
      });

      // ── Bootstrap ────────────────────────────

      async function init() {
        var slug = getCompanySlug();

        if (slug) {
          try {
            var company = await resolveCompany(slug);
            if (!company) {
              companyBlocked = true;
              refreshButton.disabled = true;
              setMessage('Company not found: ' + slug, true);
              dashboardEl.replaceChildren(el('div', 'empty-board', 'Company not found: ' + slug));
              return;
            }
            activeCompanyId = company.id;
            setBoardTitle(company.name);
          } catch (_) {
            // Company lookup failed — never silently show all companies' data
            companyBlocked = true;
            refreshButton.disabled = true;
            setMessage('Failed to resolve company \u2014 ' + slug, true);
            return;
          }
        } else {
          setBoardTitle(null);
        }

        refreshButton.addEventListener('click', function() { void refreshDashboard(); });
        void refreshDashboard();
        setInterval(function() { void refreshDashboard(); }, 30000);
      }

      void init();
    })();
  </script>
</body>
</html>
