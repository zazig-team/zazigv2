<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Idea Visualiser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090c;
      --surface: #101216;
      --surface-raised: #161a1f;
      --border: #1e2328;
      --text: #e2e4e8;
      --text-secondary: #8b919a;
      --accent: #4d8fef;
      --accent-hover: #5f9df5;
      --error: #e05252;
      --success: #3cbf6e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .auth-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 12px;
      margin-top: 8px;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(224, 82, 82, 0.1);
      border: 1px solid rgba(224, 82, 82, 0.3);
      border-radius: 8px;
      color: var(--error);
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 16px;
      display: none;
    }

    .success-msg {
      background: rgba(60, 191, 110, 0.1);
      border: 1px solid rgba(60, 191, 110, 0.3);
      border-radius: 8px;
      color: var(--success);
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">zazig / ideas-visualiser</div>
    <h1>Sign in</h1>
    <p class="subtitle">Use your Supabase credentials to access documents.</p>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-primary" id="btn-login">Sign in</button>
    </form>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = "";
    const SUPABASE_ANON_KEY = "";
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(location.search);
    const redirect = params.get('redirect') || 'docs.html';

    // Already logged in? Redirect immediately.
    const { data: { session } } = await sb.auth.getSession();
    if (session) location.href = redirect;

    const form = document.getElementById('login-form');
    const btn = document.getElementById('btn-login');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
        return;
      }

      successMsg.textContent = 'Signed in! Redirecting…';
      successMsg.style.display = 'block';
      setTimeout(() => { location.href = redirect; }, 500);
    });
  </script>
</body>
</html>
